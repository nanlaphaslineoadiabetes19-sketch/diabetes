<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การรับประทานอาหารสำหรับผู้ป่วยเบาหวาน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-food: #e67e22; /* สีส้มอาหาร */
            --secondary-food: #d35400;
            --bg-light: #fdfaf8;
            --text-dark: #2c3e50;
            --shadow: rgba(230, 126, 34, 0.15);
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #fff5e6 0%, #f4f7f6 100%);
            font-family: 'Sarabun', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* ชิดบน */
            min-height: 100vh;
        }

        /* ปุ่มกลับหน้าหลักแบบ Fixed (ลอยค้าง) */
        .nav-bar-fixed {
            position: fixed !important;
            top: 15px !important;
            left: 15px !important;
            z-index: 99999 !important;
        }

        .btn-back {
            padding: 10px 22px;
            background-color: rgba(255, 255, 255, 0.8);
            color: #555;
            border: 1px solid #ddd;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Sarabun', sans-serif;
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background-color: white;
            transform: scale(1.05);
        }

        .main-wrapper {
            max-width: 500px;
            width: 100%; /* ปรับให้เต็มจอในมือถือเพื่อความสวยงาม */
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 20px 50px var(--shadow);
            border-radius: 0 0 30px 30px; /* มนเฉพาะด้านล่างเพื่อให้ด้านบนชิดขอบ */
            padding: 15px 25px 40px; /* ปรับ padding ตัวแรกให้เหลือน้อย เพื่อให้เนื้อหาดันขึ้นบนสุด */
            text-align: center;
            margin: 0; /* ขยับขึ้นบนสุด */
            box-sizing: border-box;
            min-height: 100vh; /* ให้สีขาวลากยาวลงมาจนสุดหน้าจอ */
        }

        .icon-header {
            font-size: 75px;
            margin-bottom: 5px; /* ลดระยะห่างลงเพื่อให้ข้อความขยับตามขึ้นมา */
            margin-top: 0; /* บังคับให้หัวข้อชิดไอคอนขึ้นไปอีก */
            line-height: 1;
            display: block;
        }

        h1 { 
            color: var(--text-dark); 
            font-size: 26px; 
            margin-bottom: 15px; 
            font-weight: 700;
            line-height: 1.3;
            text-align: justify; /* จัดให้ข้อความชิดขอบทั้งสองข้างเท่ากัน */
            text-justify: inter-word; /* ช่วยกระจายช่องไฟระหว่างคำให้สวยงามยิ่งขึ้น */
        }

        h2 { 
            font-size: 26px; 
            margin-bottom: 15px; 
            font-weight: 700;
            line-height: 1.3;
            text-align: justify; /* จัดให้ข้อความชิดขอบทั้งสองข้างเท่ากัน */
            text-justify: inter-word; /* ช่วยกระจายช่องไฟระหว่างคำให้สวยงามยิ่งขึ้น */
            word-break: break-word; /* ตัดคำที่ยาวเกินไปให้ขึ้นบรรทัดใหม่ */
            hyphens: auto; /* เติมขีด (-) ให้อัตโนมัติเมื่อมีการตัดคำ (รองรับบางภาษา) */
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
        }

        .menu-container {
            display: grid;
            gap: 16px;
        }

        .menu-item {
            background-color: white;
            border: 1px solid #f9ebe0;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .menu-item:hover {
            transform: translateY(-5px);
            border-color: var(--primary-food);
            box-shadow: 0 12px 25px var(--shadow);
        }

        .menu-header {
            padding: 22px 25px;
            font-size: 19px;
            font-weight: 700;
            color: var(--text-dark);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-item:hover .menu-header {
            background-color: #fff9f4;
            color: var(--secondary-food);
        }

        .arrow-circle {
            width: 32px;
            height: 32px;
            background: #fff4e6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.3s;
            color: var(--primary-food);
        }

        .menu-item:hover .arrow-circle {
            background: var(--primary-food);
            color: white;
            transform: translateX(5px);
        }

        footer {
            margin-top: 40px;
            font-size: 12px;
            color: #bdc3c7;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="icon-header">🥗</div>
        <img src="https://lh3.googleusercontent.com/d/1uUx7zK_X-z6qlSr6hzOH1dUBx2H87CB-">
        
        <div class="menu-container">
            <div class="menu-item">
                <div class="menu-header" onclick="goTo('food_carbs')">
                    ความรู้เกี่ยวกับคาร์บ <span class="arrow-circle">➜</span>
                </div>
            </div>
            
            <div class="menu-item">
                <div class="menu-header" onclick="goTo('food_carbs_cal')">
                    คำนวณค่าคาร์บที่เหมาะสมในแต่ละวัน <span class="arrow-circle">➜</span>
                </div>
            </div>
            
            <div class="menu-item">
                <div class="menu-header" onclick="goTo('food_carbs_amount_menu')">
                    ปริมาณคาร์บในอาหาร <span class="arrow-circle">➜</span>
                </div>
            </div>
            
            <div class="menu-item">
                <div class="menu-header" onclick="goTo('food_carbs_healthy')">
                    จานอาหารสุขภาพ <span class="arrow-circle">➜</span>
                </div>
            </div>
        </div>

        <footer>&copy; 2026 ระบบดูแลเบาหวานด้วยตนเอง</footer>
    </div>

    <script>
        function goTo(pageName) {
            var baseUrl = 'https://nanlaphaslineoadiabetes19-sketch.github.io/diabetes';
            window.location.href = baseUrl + '/' + pageName + '.html';
        }

        function goBackMain() {
            var baseUrl = 'https://nanlaphaslineoadiabetes19-sketch.github.io/diabetes';
            window.location.href = baseUrl + '/diabetes.html';
        }
    </script>
</body>
</html>
