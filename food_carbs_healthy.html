<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จานอาหารสุขภาพ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #27ae60; /* สีเขียวสุขภาพ */
            --bg-color: #f8f9fa;
            --card-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Sarabun', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Nav Bar สไตล์โมเดิร์นลอยตัว */
        .nav-bar {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 9999;
        }

        .btn-back {
            padding: 10px 22px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #444;
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Sarabun', sans-serif;
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-back:hover {
            background-color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            color: var(--primary-color);
        }

        .container {
            width: 100%;
            max-width: 500px; /* ปรับความกว้างให้พอดีมือถือ */
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-wrapper {
            width: 100%;
            background: white;
            box-shadow: var(--card-shadow);
            border-radius: 0 0 30px 30px; /* มนเฉพาะด้านล่างดูหรู */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-size: 0; /* กำจัดช่องว่างระหว่างรูปภาพ */
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
            border: none;
            /* ป้องกันการกระตุกขณะโหลด */
            background-color: #eee; 
        }

        /* ส่วนท้ายเพื่อความเรียบร้อย */
        .footer-space {
            height: 40px;
            background: transparent;
        }

        /* ปรับแต่ง Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="btn-back" onclick="goBack()">
            <span style="font-size: 18px;">⬅</span> กลับหน้าหลัก
        </button>
    </div>

    <div class="container">
        <div class="main-wrapper">
            <img src="https://lh3.googleusercontent.com/d/1Y0Pm29k8TXhAq7WfgfRVQZ_8cOAKRRC5" alt="จานสุขภาพ 1">
            <img src="https://lh3.googleusercontent.com/d/1cqoHE86C9Z24DBYvz1Xlql2_XnmaFp9r" alt="จานสุขภาพ 2">
            <img src="https://lh3.googleusercontent.com/d/16r9E9Pm-PKA_tGOEYvhECDj2sRdil-_k" alt="จานสุขภาพ 3">
            <img src="https://lh3.googleusercontent.com/d/1mOt_lot47i6rsooSnIyEct2WAHmWAOFM" alt="จานสุขภาพ 4">
            <img src="https://lh3.googleusercontent.com/d/1oRrOhfxlNb5ryxUMj-NTIsGcfvBDzG5m" alt="จานสุขภาพ 5">
        </div>
        <div class="footer-space"></div>
    </div>

    <script>
        function goBack() {
            var currentPath = window.location.pathname;
            var directoryPath = currentPath.substring(0, currentPath.lastIndexOf('/'));
            location.href = directoryPath + '/food.html';
        }
    </script>
</body>
</html>
