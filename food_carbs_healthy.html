<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จานอาหารสุขภาพ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #27ae60;
            --bg-color: #f8f9fa;
            --card-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Sarabun', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .nav-bar {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 9999;
        }

        .btn-back {
            padding: 10px 22px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #444;
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Sarabun', sans-serif;
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            #backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 500px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-wrapper {
            width: 100%;
            background: white;
            box-shadow: var(--card-shadow);
            border-radius: 0 0 30px 30px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-size: 0;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
            border: none;
        }

        /* Footer ปรับปรุงใหม่ */
        footer {
            padding: 40px 20px;
            text-align: center;
            font-size: 13px;
            color: #95a5a6;
            background-color: var(--bg-color); /* ให้กลมกลืนกับพื้นหลังด้านนอก */
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="btn-back" onclick="goBack()">
            <span>⬅</span> ย้อนกลับ
        </button>
    </div>

    <div class="container">
        <div class="main-wrapper">
            <img src="https://lh3.googleusercontent.com/d/1YV5qSyBj2Lzvp0vd7CzLYY37C23UMKhc">
            <img src="https://lh3.googleusercontent.com/d/1XhNMl0TqN_kQaJy2wg4b2D5wJ3XxBS9_">
            <img src="https://lh3.googleusercontent.com/d/1Qy2ib6rVFbX3kOk_MX-QNiPJ52OdlsSJ">
            <img src="https://lh3.googleusercontent.com/d/1lKfFUM12n425McyO9xpIdwlyVd0vgIPO">
            <img src="https://lh3.googleusercontent.com/d/1noQ0bHoOQ5MRq3Fmi0jnR7gmlYG7azKu">

            <footer>
                © 2026 ระบบดูแลเบาหวานด้วยตนเอง
            </footer>
        </div>
    </div>

    <script>
        function goBack() {
            var currentPath = window.location.pathname;
            var directoryPath = currentPath.substring(0, currentPath.lastIndexOf('/'));
            location.href = directoryPath + '/food.html';
        }
    </script>
</body>
</html>
