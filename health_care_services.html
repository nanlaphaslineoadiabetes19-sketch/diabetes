<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบนัดหมายคนไข้ - พยาบาล</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FullCalendar CSS & JS -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css' rel='stylesheet' />
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { background-color: #f8f9fa; font-family: 'Prompt', sans-serif; }
        .card { border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .custom-dropdown-btn { background-color: #ffffff; border: 2px solid #e9ecef; border-radius: 12px; padding: 12px; }
        #calendar { background: white; padding: 15px; border-radius: 20px; }
        
        /* สไตล์ของ Event ปฏิทิน */
        .fc-event-busy { background-color: #0d6efd !important; border-color: #0d6efd !important; color: white !important; cursor: pointer; padding: 2px 4px; }
        .fc-event-time { font-weight: bold; color: white !important; }
        .fc-event-title { font-weight: normal; color: white !important; }

        /* เพิ่มเติมในส่วน <style> */
        .fc-event-main {
            padding: 2px 5px !important;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .fc-event-busy {
            background-color: #0d6efd !important;
            border-radius: 4px;
            margin-bottom: 2px;
        }  

        .nav-bar-fixed { position: fixed; top: 15px; left: 15px; z-index: 999; }
        .btn-back { padding: 10px 22px; background: rgba(255, 255, 255, 0.8); color: #555; border: 1px solid #ddd; border-radius: 50px; cursor: pointer; font-size: 15px; font-weight: 700; box-shadow: 0 4px 15px rgba(0,0,0,0.1); backdrop-filter: blur(8px); }

        input[type="datetime-local"]:invalid::before {
            content: 'ระบุ วัน/เดือน/ปี และเวลา';
            color: #999;
        }
        input[type="datetime-local"]:focus::before {
            content: '';
        }

        /* 1. ขยายการ์ดปฏิทินให้ชิดขอบจอ */
        .calendar-container {
            padding: 0 !important;
            margin: 0 !important;
        }
    
        /* 2. ปรับขนาดตัวหนังสือ ก.ค. 69 ให้เล็กลง */
        .fc .fc-toolbar-title {
            font-size: 1.1rem !important;
        }
    
        /* 3. ปรับขนาดปุ่ม today และ < > ให้เล็กลง */
        .fc .fc-button {
            padding: 0.2rem 0.5rem !important;
            font-size: 0.8rem !important;
        }
    
        /* 4. ปรับระยะห่างของ Header ให้แน่นขึ้นเพื่อไม่ให้ซ้อนกัน */
        .fc .fc-toolbar.fc-header-toolbar {
            gap: 5px !important;
            margin-bottom: 0.5em !important;
        }
    </style>
    
</head>
<body style="padding: 0; margin: 0;">
    <div class="nav-bar-fixed">
        <button class="btn-back" onclick="goBackMain()">⬅ ย้อนกลับ</button>
    </div>
    <br><br><br>
    
    <div style="width: 100%; padding: 5px;">
        <h2 class="mb-4">📋 ระบบนัดหมายคนไข้</h2>
        
        <!-- ส่วนเลือกคนไข้และลงนัด -->
        <div class="card p-4 mb-4">
            <label class="form-label h5 mb-2">ลงนัดหมายด่วน</label>
            
            <!-- เปลี่ยนมาใช้ Select มาตรฐานแทน เพื่อเอา Radio ออก -->
            <select id="main-patient-select" class="form-select custom-dropdown-btn mb-3">
                <option value="">-- กรุณาเลือกคนไข้ --</option>
            </select>

            <label class="form-label" style="font-size: 0.9em; color: #6c757d; margin-top: 10px;">📅 เลือกวันที่และเวลานัดหมาย:</label>
            <input type="datetime-local" id="app-date" class="form-control mb-3">
            
            <button class="btn btn-primary w-100" onclick="saveAppointments()">ลงวันนัดหมาย</button>
        </div>

        <!-- ส่วนของปฏิทิน -->
        <div class="card p-0 calendar-container">
            <h4 class="mb-3">📅 ปฏิทินนัดหมาย</h4>
            <div id="calendar"></div>
        </div>
    </div>

    <script>
       
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLuqh2ivMXanbpRRbFfhMeOElAFgyrWBkFOthPZzCTjiI0gWdy7rDXTiuYlpj2Lzyb/exec";
        let calendar;
        let globalPatients = []; 

        // 1. ดึงรายชื่อคนไข้มาใส่ใน Select
        fetch(SCRIPT_URL + "?type=getUsersForAppointment")
            .then(res => res.json())
            .then(data => {
                globalPatients = data; 
                const select = document.getElementById('main-patient-select');
                data.forEach(p => {
                    select.insertAdjacentHTML('beforeend', `<option value="${p.line_id}" data-name="${p.line_name}">${p.line_name}</option>`);
                });
            })
            .catch(err => console.error("Error loading patients:", err));

        // 2. ฟังก์ชันโหลดและสร้างปฏิทิน
        function loadAppointments() {
            fetch(SCRIPT_URL + "?type=getAppointments")
            .then(res => res.json())
            .then(data => {
                const events = data.map(row => {
                    // แปลงวันที่เพื่อให้ FullCalendar อ่านได้ถูกต้อง
                    const d = new Date(row.app_date);
                    const timeStr = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                    
                    return {
                        title: row.line_name,
                        start: row.app_date,
                        className: 'fc-event-busy',
                        extendedProps: { 
                            row: row.row, 
                            name: row.line_name,
                            time: timeStr // ส่งเวลาไปด้วย
                        }
                    };
                });

                const calendarEl = document.getElementById('calendar');
                
                if (calendar) {
                    calendar.destroy();
                }

                calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'dayGridMonth',
                    locale: 'th',
                    height: 'auto',
                    events: events,

                    // --- ชื่อเดือนย่อ ---
                    // titleFormat: { year: 'numeric', month: 'short' },
                    
                    // --- ชื่อเดือนย่อ และ พ.ศ. ---
                    titleFormat: { year: '2-digit', month: 'short' },

                    // เพิ่มส่วนนี้ เพื่อปรับชื่อวันให้เป็นตัวย่อ อา-ส
                    dayHeaderContent: function(arg) {
                        const shortDays = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];
                        return shortDays[arg.date.getDay()];
                    },

                    // ปรับการแสดงผลในปฏิทินให้เป็น เวลา + ชื่อคนไข้
                    eventContent: function(arg) {
                        return {
                            html: `<div class="fc-event-main" style="padding: 2px; font-size: 0.85em;">
                                     <b>${arg.event.extendedProps.time}</b> ${arg.event.title}
                                   </div>`
                        };
                    },

                    // --- เมื่อกดที่ "รายการนัดหมาย" บนปฏิทิน ---
                    eventClick: function(info) {
                        const d = info.event.start;
                        // แปลงเวลาให้เป็นรูปแบบ datetime-local
                        const localIso = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}T${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;

                        Swal.fire({
                            title: `นัดหมาย: ${info.event.title}`,
                            html: `
                                <div class="mb-3">เวลา: ${info.event.extendedProps.time} น.</div>
                                <button class="btn btn-warning" onclick="editApp(${info.event.extendedProps.row}, '${localIso}')">✏️ แก้ไข</button>
                                <button class="btn btn-danger" onclick="deleteApp(${info.event.extendedProps.row})">🗑️ ลบ</button>
                            `,
                            showConfirmButton: false,
                            showCloseButton: true
                        });
                    },

                    // --- ปรับปรุง dateClick เพื่อให้แสดงรายการนัดหมายของวันนั้นๆ ---
                    dateClick: function(info) {
                        // 1. กรองหานัดหมายที่ตรงกับวันที่คลิก
                        const clickedDate = info.dateStr;
                        const appointmentsOnDate = calendar.getEvents().filter(event => {
                            return event.startStr.split('T')[0] === clickedDate;
                        });
                    
                        let listHtml = '';
                        if (appointmentsOnDate.length > 0) {
                            listHtml = `<div class="list-group mt-3">`;
                            appointmentsOnDate.forEach(app => {
                                // สร้างการ์ดของแต่ละคน
                                listHtml += `
                                    <div class="list-group-item d-flex justify-content-between align-items-center">
                                        <div>
                                            <strong>${app.title}</strong><br>
                                            <small>⏰ เวลา: ${app.extendedProps.time} น.</small>
                                        </div>
                                        <div>
                                            <button class="btn btn-sm btn-warning" onclick="editApp(${app.extendedProps.row}, '${app.start.toISOString().slice(0, 16)}')">✏️</button>
                                            <button class="btn btn-sm btn-danger" onclick="deleteApp(${app.extendedProps.row})">🗑️</button>
                                        </div>
                                    </div>`;
                            });
                            listHtml += `</div>`;
                        } else {
                            listHtml = `<p class="mt-3 text-muted">วันนี้ยังไม่มีนัดหมาย</p>`;
                        }
                    
                        // 2. แสดงผลด้วย SweetAlert2
                        Swal.fire({
                            title: `📅 นัดหมายวันที่ ${clickedDate}`,
                            html: `
                                ${listHtml}
                                <hr>
                                <button class="btn btn-primary w-100" onclick="showAddForm('${clickedDate}')">+ เพิ่มนัดหมายใหม่</button>
                            `,
                            showConfirmButton: false,
                            showCloseButton: true
                        });
                    },
                    
                });
                calendar.render(); 
            })
            .catch(err => console.error("Error loading appointments:", err));
        }

        function showAddForm(dateStr) {
            // ปิดหน้าต่างรายการนัดหมายอันเก่าก่อน
            Swal.close();
        
            // เปิดฟอร์มเพิ่มนัดหมาย (ดึงโค้ดมาจาก dateClick เดิมของคุณ)
            let optionsHtml = '<option value="">-- กรุณาเลือกคนไข้ --</option>';
            globalPatients.forEach(p => {
                optionsHtml += `<option value="${p.line_id}" data-name="${p.line_name}">${p.line_name}</option>`;
            });
        
            Swal.fire({
                title: '📅 เพิ่มการนัดหมาย',
                html: `
                    <div class="mb-3 text-start mt-3">
                        <label class="form-label fw-bold">เลือกคนไข้:</label>
                        <select id="swal-patient-select" class="form-select">${optionsHtml}</select>
                    </div>
                    <div class="mb-3 text-start">
                        <label class="form-label fw-bold">วันที่และเวลานัด:</label>
                        <input type="datetime-local" id="swal-app-date" class="form-control" value="${dateStr}T09:00">
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'บันทึกนัดหมาย',
                preConfirm: () => {
                    const selectEl = document.getElementById('swal-patient-select');
                    const pId = selectEl.value;
                    const pName = selectEl.options[selectEl.selectedIndex] ? selectEl.options[selectEl.selectedIndex].getAttribute('data-name') : null;
                    const dateVal = document.getElementById('swal-app-date').value;
                    if (!pId || !dateVal) {
                        Swal.showValidationMessage('กรุณาเลือกคนไข้และเวลาให้ครบถ้วน');
                        return false;
                    }
                    return { id: pId, name: pName, date: dateVal };
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire({title: 'กำลังบันทึก...', allowOutsideClick: false});
                    Swal.showLoading();
                    
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            action: 'addBulkAppointments', 
                            patients: JSON.stringify([{id: result.value.id, name: result.value.name}]), 
                            appointment_date: result.value.date 
                        })
                    }).then(() => {
                        showToast("บันทึกสำเร็จ!");
                        loadAppointments(); 
                    }).catch(err => console.error("Error saving:", err));
                }
            });
        }

        function showToast(text, icon = 'success') {
            Swal.fire({ text: text, icon: icon, toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
        }

        // 3. ฟังก์ชันบันทึกนัดหมาย (ดึงค่าจาก Select แทน)
        function saveAppointments() {
            const selectEl = document.getElementById('main-patient-select');
            const pId = selectEl.value;
            
            if(!pId) return showToast("กรุณาเลือกคนไข้", "error");
            
            const pName = selectEl.options[selectEl.selectedIndex].getAttribute('data-name');
            const date = document.getElementById('app-date').value;
            
            if(!date) return showToast("กรุณาเลือกวันและเวลา", "error");

            Swal.fire({title: 'กำลังบันทึก...', allowOutsideClick: false});
            Swal.showLoading();

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ 
                    action: 'addBulkAppointments', 
                    patients: JSON.stringify([{id: pId, name: pName}]), 
                    appointment_date: date 
                })
            }).then(() => {
                showToast("บันทึกสำเร็จ!");
                document.getElementById('app-date').value = ''; 
                selectEl.value = ''; // รีเซ็ต Dropdown กลับเป็นค่าว่าง
                loadAppointments(); 
            }).catch(err => console.error("Error saving:", err));
        }

        // 4. ฟังก์ชันลบนัดหมาย
        function deleteApp(row) {
            Swal.fire({
                title: 'ยืนยันการลบ?',
                text: "หากลบแล้วจะไม่สามารถกู้คืนได้",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'ใช่, ลบเลย',
                cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire({title: 'กำลังลบ...', allowOutsideClick: false});
                    Swal.showLoading();
                    
                    fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteAppointment', row: row }) })
                    .then(() => { showToast("ลบสำเร็จ"); loadAppointments(); });
                }
            });
        }

        // 5. ฟังก์ชันแก้ไขนัดหมาย
        function editApp(row, currentDate) {
            Swal.fire({
                title: '✏️ แก้ไขเวลานัดหมาย',
                html: `<input type="datetime-local" id="swal-edit-date" class="form-control mt-3" value="${currentDate}">`,
                showCancelButton: true,
                confirmButtonText: 'บันทึกการแก้ไข',
                cancelButtonText: 'ยกเลิก',
                preConfirm: () => document.getElementById('swal-edit-date').value
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire({title: 'กำลังอัปเดต...', allowOutsideClick: false});
                    Swal.showLoading();

                    fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'editAppointment', row: row, new_date: result.value }) })
                    .then(() => { showToast("แก้ไขสำเร็จ"); loadAppointments(); });
                }
            });
        }

        window.onload = loadAppointments;

        function goBackMain() {
            window.location.href = 'https://liff.line.me/2009966517-pPEyRumg';
        }
        
        window.addEventListener('load', function() {
            const dateInput = document.getElementById('app-date');
            const now = new Date();
            // ปรับให้เป็นรูปแบบที่ input ยอมรับ (YYYY-MM-DDThh:mm)
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            dateInput.value = now.toISOString().slice(0,16);
        });
        
    </script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
