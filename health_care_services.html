<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบนัดหมายคนไข้ - พยาบาล</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- เพิ่ม FullCalendar CSS -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Prompt', sans-serif; }
        .card { border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .custom-dropdown-btn { background-color: #ffffff; border: 2px solid #e9ecef; border-radius: 12px; padding: 12px; }
        #calendar { background: white; padding: 15px; border-radius: 20px; }
        .fc-event-busy { background-color: #dc3545 !important; border-color: #dc3545 !important; cursor: pointer; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="p-4">
    <div class="container">
        <h2 class="mb-4">📋 ระบบนัดหมายคนไข้</h2>
        <div class="card p-4 mb-4">
            <label class="form-label h5 mb-2">เลือกรายชื่อคนไข้</label>
            <div class="dropdown mb-3">
                <button class="btn custom-dropdown-btn w-100 text-start dropdown-toggle" type="button" data-bs-toggle="dropdown">กรุณาเลือกคนไข้...</button>
                <ul class="dropdown-menu w-100 p-2 shadow-sm" id="patient-list"></ul>
            </div>
            <input type="datetime-local" id="app-date" class="form-control mb-3">
            <button class="btn btn-primary w-100" onclick="saveAppointments()">ลงวันนัดหมาย</button>
        </div>

        <!-- ส่วนของปฏิทิน -->
        <div class="card p-4">
            <h4 class="mb-3">📅 ปฏิทินนัดหมาย</h4>
            <div id="calendar"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLuqh2ivMXanbpRRbFfhMeOElAFgyrWBkFOthPZzCTjiI0gWdy7rDXTiuYlpj2Lzyb/exec";
        let calendar;

        // 1. ดึงรายชื่อ
        fetch(SCRIPT_URL + "?type=getUsersForAppointment")
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('patient-list');
                data.forEach(p => {
                    list.insertAdjacentHTML('beforeend', `<li><label class="dropdown-item"><input type="radio" name="p-radio" class="me-2 p-check" value="${p.line_id}" data-name="${p.line_name}"> ${p.line_name}</label></li>`);
                });
            });

        // 2. ฟังก์ชันโหลดปฏิทิน
        function loadAppointments() {
            fetch(SCRIPT_URL + "?type=getAppointments")
            .then(res => res.json())
            .then(data => {
                const events = data.map(row => ({
                    title: row.line_name,
                    start: row.app_date,
                    className: 'fc-event-busy',
                    extendedProps: { row: row.row, name: row.line_name }
                }));

                const calendarEl = document.getElementById('calendar');
                calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'dayGridMonth',
                    locale: 'th',
                    events: events,
                    eventClick: function(info) {
                        Swal.fire({
                            title: info.event.title,
                            html: `เวลานัด: ${info.event.start.toLocaleString('th-TH')}<br><br>
                                   <button class="btn btn-warning" onclick="editApp(${info.event.extendedProps.row}, '${info.event.title}', '${info.event.start.toISOString().slice(0,16)}')">แก้ไข</button>
                                   <button class="btn btn-danger" onclick="deleteApp(${info.event.extendedProps.row})">ลบ</button>`,
                            showConfirmButton: false
                        });
                    }
                });
                calendar.render();
            });
        }

        function showToast(text, icon = 'success') {
            Swal.fire({ text: text, icon: icon, toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
        }

        function saveAppointments() {
            const selected = document.querySelector('.p-check:checked');
            if(!selected) return showToast("กรุณาเลือกคนไข้", "error");
            
            const date = document.getElementById('app-date').value;
            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'addBulkAppointments', patients: JSON.stringify([{id: selected.value, name: selected.getAttribute('data-name')}]), appointment_date: date })
            }).then(() => {
                showToast("บันทึกสำเร็จ!");
                loadAppointments();
            });
        }

        function deleteApp(row) {
            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteAppointment', row: row }) })
            .then(() => { Swal.close(); showToast("ลบแล้ว"); loadAppointments(); });
        }

        function editApp(row, name, currentDate) {
            Swal.fire({
                title: 'แก้ไขนัดหมาย',
                html: `<input type="datetime-local" id="swal-edit-date" class="form-control" value="${currentDate}">`,
                preConfirm: () => document.getElementById('swal-edit-date').value
            }).then((result) => {
                if (result.isConfirmed) {
                    fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'editAppointment', row: row, new_date: result.value }) })
                    .then(() => { showToast("แก้ไขสำเร็จ"); loadAppointments(); });
                }
            });
        }

        window.onload = loadAppointments;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
