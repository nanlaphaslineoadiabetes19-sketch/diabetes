<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบนัดหมายคนไข้ - พยาบาล</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Prompt', sans-serif; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .calendar-table { background: white; border-radius: 10px; overflow: hidden; }
        .selected-row { background-color: #e7f3ff; }
    </style>
</head>
<body class="p-4">

<div class="container">
    <h2 class="mb-4">📋 ระบบจัดการนัดหมายคนไข้</h2>
    
    <!-- ส่วนเลือกรายชื่อคนไข้ -->
    <div class="card p-4 mb-4">
        <h4>เลือกรายชื่อคนไข้ (เลือกได้หลายคน)</h4>
        <div id="patient-list" class="row">
            <!-- ข้อมูลจาก Google Apps Script จะมาแสดงตรงนี้ -->
            <div class="col-md-3"><input type="checkbox" value="1"> นาย ก.</div>
            <div class="col-md-3"><input type="checkbox" value="2"> นาง ข.</div>
        </div>
        <button class="btn btn-primary mt-3">ลงวันนัดหมาย</button>
    </div>

    <!-- ตารางปฏิทินแสดงคิว -->
    <div class="card p-4">
        <h4>ตารางนัดหมายภาพรวม</h4>
        <table class="table table-hover calendar-table mt-3">
            <thead class="table-light">
                <tr>
                    <th>วัน/เวลา</th><th>ชื่อคนไข้</th><th>สถานะ</th><th>จัดการ</th>
                </tr>
            </thead>
            <tbody>
                <!-- แสดงรายการนัดที่ดึงจาก Sheet -->
                <tr>
                    <td>05/07/2026 09:00</td>
                    <td>นาย ก.</td>
                    <td><span class="badge bg-success">ยืนยันแล้ว</span></td>
                    <td>
                        <button class="btn btn-sm btn-warning">แก้ไข</button>
                        <button class="btn btn-sm btn-danger">ลบ</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
