<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบนัดหมายคนไข้ - พยาบาล</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Prompt', sans-serif; font-size: 1.1rem; }
        .card { border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .dropdown-menu { max-height: 300px; overflow-y: auto; width: 100%; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
    
<body class="p-4">
    
    <div class="container">
        <h2 class="mb-4">📋 ระบบนัดหมายคนไข้</h2>
        
        <div class="card p-4 mb-4">
            <label class="form-label h4">เลือกรายชื่อคนไข้</label>
            <div class="dropdown mb-3">
                <button class="btn btn-outline-secondary dropdown-toggle w-100 text-start" data-bs-toggle="dropdown">เลือกคนไข้...</button>
                <ul class="dropdown-menu p-3" id="patient-list">
                    <li><label><input type="checkbox" id="selectAll"> เลือกทั้งหมด</label></li>
                </ul>
            </div>
            <input type="datetime-local" id="app-date" class="form-control mb-3">
            <button class="btn btn-primary w-100" onclick="saveAppointments()">ลงวันนัดหมาย</button>
        </div>
    </div>

    <div class="card p-4">
        <h4 class="mb-3">📅 ตารางนัดหมาย</h4>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead><tr><th>ชื่อคนไข้</th><th>วันนัด</th><th>จัดการ</th></tr></thead>
                <tbody id="appointment-table"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLuqh2ivMXanbpRRbFfhMeOElAFgyrWBkFOthPZzCTjiI0gWdy7rDXTiuYlpj2Lzyb/exec";
    
        // 1. ดึงรายชื่อ 
        fetch(SCRIPT_URL + "?type=getUsersForAppointment")
            .then(res => res.json())
            .then(data => {
                console.log("ข้อมูลที่ได้จาก Script:", data);
    
                // ตรวจสอบก่อนว่า data เป็น Array จริงไหม
                if (Array.isArray(data)) {
                const list = document.getElementById('patient-list');
                    data.forEach(p => {
                        list.insertAdjacentHTML('beforeend', `<li><label><input type="checkbox" class="p-check" value="${p.line_id}" data-name="${p.line_name}"> ${p.line_name}</label></li>`);
                    });
                } else {
                    console.error("ข้อมูลไม่ใช่ Array:", data);
                    alert("เกิดข้อผิดพลาด: ข้อมูลที่ได้รับไม่ถูกต้อง");
                }
            })
            .catch(err => console.error("Fetch error:", err));
    
        // 2. เลือกทั้งหมด
        document.getElementById('selectAll').onclick = function() {
            document.querySelectorAll('.p-check').forEach(c => c.checked = this.checked);
        };

        // ฟังก์ชันแจ้งเตือนแบบมืออาชีพ
        function showToast(text, icon = 'success') {
            Swal.fire({ text: text, icon: icon, toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
        }
    
        // 3. ปรับปรุงการบันทึก
        function saveAppointments() {
            const selected = [];
            document.querySelectorAll('.p-check:checked').forEach(c => {
                selected.push({ id: c.value, name: c.getAttribute('data-name') });
            });
            const date = document.getElementById('app-date').value;
            
            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'addBulkAppointments', patients: JSON.stringify(selected), appointment_date: date })
            }).then(() => {
                showToast("บันทึกนัดหมายสำเร็จ!");
                loadAppointments(); // ดึงตารางใหม่
            });
        }

        // 4. ฟังก์ชันดึงตารางนัดหมาย
        function loadAppointments() {
            fetch(SCRIPT_URL + "?type=getAppointments")
            .then(res => res.json())
            .then(data => {
                const tbody = document.getElementById('appointment-table');
                tbody.innerHTML = '';
                data.forEach((row) => {
                    tbody.insertAdjacentHTML('beforeend', `<tr>
                        <td>${row.line_name}</td>
                        <td>${row.app_date}</td>
                        <td>
                            <button class="btn btn-sm btn-danger" onclick="deleteApp(${row.row})">ลบ</button>
                        </td>
                    </tr>`);
                });
            });
        }
        
        // เรียกให้ทำงานตอนโหลดหน้าเว็บ
        window.onload = loadAppointments;
        
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
