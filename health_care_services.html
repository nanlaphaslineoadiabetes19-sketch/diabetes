<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบนัดหมายคนไข้ - พยาบาล</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Prompt', sans-serif; font-size: 1.1rem; }
        .card { border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .dropdown-menu { max-height: 300px; overflow-y: auto; width: 100%; }

        /* ปรับแต่ง Dropdown ให้สวยงาม */
        .custom-dropdown-btn {
            background-color: #ffffff;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 12px;
            transition: all 0.3s;
        }
        .custom-dropdown-btn:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
    
<body class="p-4">
    
    <div class="container">
        <h2 class="mb-4">📋 ระบบนัดหมายคนไข้</h2>
        
        <div class="card p-4 mb-4">
            <label class="form-label h5 mb-2">เลือกรายชื่อคนไข้</label>
            <div class="dropdown mb-3">
                <button class="btn custom-dropdown-btn w-100 text-start dropdown-toggle" 
                        type="button" data-bs-toggle="dropdown">
                    กรุณาเลือกคนไข้...
                </button>
                <ul class="dropdown-menu w-100 p-2 shadow-sm" id="patient-list">
                    <!-- รายชื่อคนไข้จะมาอยู่ที่นี่ -->
                </ul>
            </div>
            <input type="datetime-local" id="app-date" class="form-control mb-3">
            <button class="btn btn-primary w-100" onclick="saveAppointments()">ลงวันนัดหมาย</button>
        </div>
    </div>

    <div id="appointment-cards" class="mt-4">
        <h5 class="mb-3">📅 รายการนัดหมาย</h5>
        <!-- รายการนัดจะถูกแสดงที่นี่ -->
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLuqh2ivMXanbpRRbFfhMeOElAFgyrWBkFOthPZzCTjiI0gWdy7rDXTiuYlpj2Lzyb/exec";
    
        // 1. ดึงรายชื่อ 
        fetch(SCRIPT_URL + "?type=getUsersForAppointment")
            .then(res => res.json())
            .then(data => {
                console.log("ข้อมูลที่ได้จาก Script:", data);
    
                // ตรวจสอบก่อนว่า data เป็น Array จริงไหม
                if (Array.isArray(data)) {
                const list = document.getElementById('patient-list');
                    data.forEach(p => {
                        list.insertAdjacentHTML('beforeend', `<li><label><input type="checkbox" class="p-check" value="${p.line_id}" data-name="${p.line_name}"> ${p.line_name}</label></li>`);
                    });
                } else {
                    console.error("ข้อมูลไม่ใช่ Array:", data);
                    alert("เกิดข้อผิดพลาด: ข้อมูลที่ได้รับไม่ถูกต้อง");
                }
            })
            .catch(err => console.error("Fetch error:", err));
    
        // 2. เลือกทั้งหมด
        document.getElementById('selectAll').onclick = function() {
            document.querySelectorAll('.p-check').forEach(c => c.checked = this.checked);
        };

        // ฟังก์ชันแจ้งเตือนแบบมืออาชีพ
        function showToast(text, icon = 'success') {
            Swal.fire({ text: text, icon: icon, toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
        }
    
        // 3. ปรับปรุงการบันทึก
        function saveAppointments() {
            const selected = [];
            document.querySelectorAll('.p-check:checked').forEach(c => {
                selected.push({ id: c.value, name: c.getAttribute('data-name') });
            });
            const date = document.getElementById('app-date').value;
            
            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'addBulkAppointments', patients: JSON.stringify(selected), appointment_date: date })
            }).then(() => {
                showToast("บันทึกนัดหมายสำเร็จ!");
                loadAppointments(); // ดึงตารางใหม่
            });
        }

        // ฟังก์ชันลบ
        function deleteApp(row) {
            Swal.fire({
                title: 'ยืนยันการลบ?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'ลบเลย',
                cancelButtonText: 'ยกเลิก'
            }).then((result) => {
                if (result.isConfirmed) {
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'deleteAppointment', row: row })
                    }).then(() => {
                        showToast("ลบนัดหมายแล้ว");
                        loadAppointments();
                    });
                }
            });
        }

        // ฟังก์ชันแก้ไข ใช้ SweetAlert2
        function editApp(row, name, currentDate) {
            Swal.fire({
                title: 'แก้ไขเวลานัดหมาย',
                html: `
                    <div class="text-start mb-3">
                        <label class="form-label">คนไข้: <strong>${name}</strong></label>
                        <input type="datetime-local" id="swal-edit-date" class="form-control" value="${currentDate}">
                    </div>
                `,
                showCancelButton: true,
                confirmButtonColor: '#ffc107', // สีเหลืองให้เข้ากับปุ่มแก้ไข
                confirmButtonText: 'บันทึกการแก้ไข',
                cancelButtonText: 'ยกเลิก',
                preConfirm: () => {
                    const newDate = document.getElementById('swal-edit-date').value;
                    if (!newDate) {
                        Swal.showValidationMessage('กรุณาเลือกวันและเวลาใหม่');
                    }
                    return newDate;
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    const newDate = result.value;
                    
                    // เรียก API เพื่อส่งข้อมูลไปอัปเดต
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            action: 'editAppointment', 
                            row: row, 
                            new_date: newDate 
                        })
                    })
                    .then(res => res.json())
                    .then(data => {
                        showToast("อัปเดตนัดหมายสำเร็จ!", "success");
                        loadAppointments(); // โหลดตารางใหม่
                    })
                    .catch(err => {
                        Swal.fire('ข้อผิดพลาด', 'ไม่สามารถแก้ไขข้อมูลได้', 'error');
                    });
                }
            });
        }

        // 4. ฟังก์ชันดึงตารางนัดหมาย
        function loadAppointments() {
            fetch(SCRIPT_URL + "?type=getAppointments")
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('appointment-cards');
                container.innerHTML = '';
                
                data.forEach((row) => {
                    const dateObj = new Date(row.app_date);
                    const formattedDate = dateObj.toLocaleDateString('th-TH', { 
                        day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' 
                    });
    
                    // สร้างการ์ดนัดหมาย
                    container.insertAdjacentHTML('beforeend', `
                        <div class="card mb-3 border-0 shadow-sm p-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="mb-0 text-primary fw-bold">${row.line_name}</h6>
                                    <small class="text-muted"><i class="bi bi-calendar-check"></i> ${formattedDate}</small>
                                </div>
                                <div>
                                    <button class="btn btn-sm btn-outline-warning me-2" onclick="editApp(${row.row}, '${row.line_name}', '${row.app_date}')">แก้ไข</button>
                                    <button class="btn btn-sm btn-outline-danger" onclick="deleteApp(${row.row})">ลบ</button>
                                </div>
                            </div>
                        </div>
                    `);
                });
            });
        }
        
        // เรียกให้ทำงานตอนโหลดหน้าเว็บ
        window.onload = loadAppointments;
        
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
