<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดต่อสอบถามพยาบาล</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* สไตล์ความสวยงามระดับมืออาชีพ */
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        header { background: #06c755; color: white; padding: 20px; text-align: center; font-weight: bold; }
        #chat-container { display: flex; flex-direction: column; gap: 10px; padding: 15px; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 75%; font-size: 14px; }
        .sent { background: #06c755; color: white; align-self: flex-end; }
        .received { background: #e5e5ea; color: black; align-self: flex-start; }
        small { display: block; font-size: 10px; opacity: 0.7; margin-top: 4px; }
        .user-info { text-align: center; color: #666; font-size: 14px; margin-bottom: 10px; }
        footer { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { background: #06c755; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <header>ติดต่อสอบถามพยาบาล</header>
    <div class="user-info" id="user-display">กำลังโหลดข้อมูลผู้ใช้...</div>
    <div id="chat-container"></div>
    <footer>
        <input type="text" id="message-input" placeholder="พิมพ์ข้อความที่นี่...">
        <button id="send-btn">ส่ง</button>
    </footer>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwLuqh2ivMXanbpRRbFfhMeOElAFgyrWBkFOthPZzCTjiI0gWdy7rDXTiuYlpj2Lzyb/exec";
        let userInfo = { id: "", name: "" };
    
        async function init() {
            // 1. Initialize LIFF
            await liff.init({ liffId: "2010571894-SPkCK10Z" });
            
            // 2. ตรวจสอบว่าล็อกอินหรือยัง
            if (!liff.isLoggedIn()) {
                // ถ้ายังไม่ล็อกอิน ให้สั่ง login แล้วหยุดการทำงานของฟังก์ชันนี้ไว้ก่อน
                liff.login();
                return; 
            }

            // 3. ถ้าล็อกอินแล้ว ค่อยดึงข้อมูล Profile
            try {
                const profile = await liff.getProfile();
                userInfo = { id: profile.userId, name: profile.displayName };
                document.getElementById("user-display").innerText = "ผู้ถาม: " + userInfo.name;
                
                // เมื่อโหลดหน้าเว็บเสร็จ ให้ดึงประวัติแชททันที
                loadChat();
                // ตั้งค่าให้ดึงข้อความใหม่ทุกๆ 3 วินาที (เพื่อให้เห็นข้อความที่พยาบาลตอบกลับ)
                setInterval(loadChat, 3000); 
            } catch (err) {
                console.error("Error getting profile:", err);
                document.getElementById("user-display").innerText = "เกิดข้อผิดพลาดในการโหลดข้อมูล";
            }
        }
    
        async function loadChat() {
            const response = await fetch(`${WEB_APP_URL}?action=getChatLogs`);
            const logs = await response.json();
            const container = document.getElementById("chat-container");
            
            // เก็บตำแหน่ง scroll ปัจจุบันไว้
            const isAtBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 50;
            
            container.innerHTML = ""; 
            
            if (Array.isArray(logs)) {
                logs.forEach(row => {
                    if (row[1] && String(row[1]).trim() == String(userInfo.id).trim()) {
                        const div = document.createElement("div");
                        div.className = `message ${row[4] === 'admin' ? 'received' : 'sent'}`;
                        div.innerHTML = `<div>${row[3]}</div><small>${row[0]}</small>`;
                        container.appendChild(div);
                    }
                });
            }
            
            // ถ้าเคยอยู่ที่ล่างสุด ให้เลื่อนตามข้อความใหม่
            if (isAtBottom) container.scrollTop = container.scrollHeight;
        }
    
        document.getElementById("send-btn").onclick = async () => {
            const input = document.getElementById("message-input");
            const msg = input.value;
            if (!msg) return;
    
            // 1. เพิ่มข้อความลงจอทันที (Optimistic UI)
            const container = document.getElementById("chat-container");
            const div = document.createElement("div");
            div.className = "message sent";
            div.innerHTML = `<div>${msg}</div><small>กำลังส่ง...</small>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            input.value = "";
    
            // 2. ส่งข้อมูลไป Google Sheets
            await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "saveChat",
                    line_id: userInfo.id,
                    line_name: userInfo.name,
                    message: msg,
                    sender: "user"
                })
            });
    
            // ไม่ต้องใช้ SweetAlert ที่ต้องกดปิด เพื่อให้แชทลื่นไหลที่สุด
            loadChat();
        };
    
        init();
    </script>
    
</body>
</html>
