<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดต่อสอบถามพยาบาล</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* สไตล์ความสวยงามระดับมืออาชีพ */
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        header { background: #06c755; color: white; padding: 20px; text-align: center; font-weight: bold; }
        #chat-container { display: flex; flex-direction: column; gap: 10px; padding: 15px; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 75%; font-size: 14px; }
        .sent { background: #06c755; color: white; align-self: flex-end; }
        .received { background: #e5e5ea; color: black; align-self: flex-start; }
        small { display: block; font-size: 10px; opacity: 0.7; margin-top: 4px; }
        .user-info { text-align: center; color: #666; font-size: 14px; margin-bottom: 10px; }
        footer { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { background: #06c755; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <header>ติดต่อสอบถามพยาบาล</header>
    <div class="user-info" id="user-display">กำลังโหลดข้อมูลผู้ใช้...</div>
    <div id="chat-container"></div>
    <footer>
        <input type="text" id="message-input" placeholder="พิมพ์ข้อความที่นี่...">
        <button id="send-btn">ส่ง</button>
    </footer>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwLuqh2ivMXanbpRRbFfhMeOElAFgyrWBkFOthPZzCTjiI0gWdy7rDXTiuYlpj2Lzyb/exec";
        let userInfo = { id: "", name: "" };

        async function init() {
            await liff.init({ liffId: "2010571894-SPkCK10Z" });
            const profile = await liff.getProfile();
            userInfo = { id: profile.userId, name: profile.displayName };
            document.getElementById("user-display").innerText = "ผู้ถาม: " + userInfo.name;
        }

        // ฟังก์ชันดึงประวัติแชท
        async function loadChat() {
            const response = await fetch(`${WEB_APP_URL}?action=getChatLogs`);
            const logs = await response.json();
            const container = document.getElementById("chat-container");
            container.innerHTML = ""; // ล้างจอเก่า
        
            // วนลูปแสดงเฉพาะของตัวเอง (กรองด้วย line_id)
            logs.forEach(row => {
                // row[1] คือ line_id, row[3] คือ message, row[4] คือ sender
                if (row[1] == userInfo.id) {
                    const div = document.createElement("div");
                    div.className = `message ${row[4] === 'admin' ? 'received' : 'sent'}`;
                    div.innerHTML = `<div>${row[3]}</div><small>${row[0]}</small>`;
                    container.appendChild(div);
                }
            });
            container.scrollTop = container.scrollHeight; // เลื่อนล่างสุด
        }

        document.getElementById("send-btn").onclick = async () => {
            const msg = document.getElementById("message-input").value;
            if (!msg) return;

            // ส่งข้อมูลไปบันทึกใน Google Sheets ผ่าน Web App
            await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "saveChat",
                    line_id: userInfo.id,
                    line_name: userInfo.name,
                    message: msg,
                    sender: "user"
                })
            });
            
            Swal.fire({
              icon: 'success',
              title: 'ส่งข้อความเรียบร้อย',
              text: 'พยาบาลได้รับข้อความของคุณแล้วค่ะ',
              timer: 2000,
              showConfirmButton: false
            });
            
            document.getElementById("message-input").value = "";
            loadChat(); // โหลดแชทใหม่ทันที
        };

        init();
    </script>
</body>
</html>
