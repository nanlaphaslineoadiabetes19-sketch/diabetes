<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดต่อสอบถามพยาบาล</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* สไตล์ความสวยงามระดับมืออาชีพ */
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        header { background: #06c755; color: white; padding: 20px; text-align: center; font-weight: bold; }
        #chat-container { flex: 1; padding: 20px; overflow-y: auto; }
        .user-info { text-align: center; color: #666; font-size: 14px; margin-bottom: 10px; }
        footer { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { background: #06c755; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <header>ติดต่อสอบถามพยาบาล</header>
    <div class="user-info" id="user-display">กำลังโหลดข้อมูลผู้ใช้...</div>
    <div id="chat-container"></div>
    <footer>
        <input type="text" id="message-input" placeholder="พิมพ์ข้อความที่นี่...">
        <button id="send-btn">ส่ง</button>
    </footer>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwLuqh2ivMXanbpRRbFfhMeOElAFgyrWBkFOthPZzCTjiI0gWdy7rDXTiuYlpj2Lzyb/exec";
        let userInfo = { id: "", name: "" };

        async function init() {
            await liff.init({ liffId: "2010571894-SPkCK10Z" });
            const profile = await liff.getProfile();
            userInfo = { id: profile.userId, name: profile.displayName };
            document.getElementById("user-display").innerText = "ผู้ถาม: " + userInfo.name;
        }

        document.getElementById("send-btn").onclick = async () => {
            const msg = document.getElementById("message-input").value;
            if (!msg) return;

            // ส่งข้อมูลไปบันทึกใน Google Sheets ผ่าน Web App
            await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "saveChat",
                    line_id: userInfo.id,
                    line_name: userInfo.name,
                    message: msg,
                    sender: "user"
                })
            });
            
            alert("ส่งข้อความเรียบร้อยแล้วค่ะ");
            document.getElementById("message-input").value = "";
        };

        init();
    </script>
</body>
</html>
