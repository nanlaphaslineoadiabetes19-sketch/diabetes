<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งเวลาแจ้งเตือนทานยา - Admin</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body { background-color: #f4f7f6; font-family: 'Prompt', sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card-header { background: linear-gradient(135deg, #0d6efd, #0dcaf0); color: white; border-radius: 15px 15px 0 0 !important; }
        .form-label { font-weight: 600; color: #495057; }
        .required::after { content: " *"; color: red; }
    </style>
</head>
<body class="p-4">

    <div class="container" style="max-width: 800px;">
        <div class="card">
            <div class="card-header p-4">
                <h4 class="mb-0">💊 ตั้งเวลาทานยา (Set Medicine)</h4>
                <p class="mb-0 mt-1" style="font-size: 0.9rem; opacity: 0.9;">บริหารจัดการรอบการทานยาและคลังยาของผู้ป่วย</p>
            </div>
            
            <div class="card-body p-4">
                <form id="medicineForm" onsubmit="saveMedicine(event)">
                    
                    <!-- ส่วนที่ 1: เลือกคนไข้ -->
                    <div class="mb-4">
                        <label for="patientSelect" class="form-label required">เลือกรายชื่อคนไข้ (ดึงจากระบบชีท pretest)</label>
                        <select class="form-select form-select-lg" id="patientSelect" required>
                            <option value="">-- กำลังโหลดรายชื่อผู้ป่วย... --</option>
                        </select>
                        <input type="hidden" id="line_name"> <!-- เก็บชื่อเพื่อส่งลงชีท -->
                    </div>

                    <!-- ส่วนที่ 2: ข้อมูลยา -->
                    <div class="row mb-4">
                        <div class="col-md-8">
                            <label for="medType" class="form-label required">เลือกชนิดยาและวิธีใช้</label>
                            <select class="form-select form-select-lg" id="medType" onchange="toggleTimeFields()" required>
                                <option value="">-- กรุณาเลือกยา --</option>
                                <optgroup label="🔹 ทานก่อนอาหาร">
                                    <option value="Glipizide 5mg (1 เม็ด)" data-time="before">กลิพิไซด์ (Glipizide) 5mg - ทาน 1 เม็ด (ก่อนอาหาร 30 นาที)</option>
                                </optgroup>
                                <optgroup label="🔸 ทานหลังอาหาร">
                                    <option value="Metformin 500mg (1 เม็ด)" data-time="after">เมทฟอร์มิน (Metformin) 500mg - ทาน 1 เม็ด (พร้อม/หลังอาหารทันที)</option>
                                    <option value="Metformin 500mg (2 เม็ด)" data-time="after">เมทฟอร์มิน (Metformin) 500mg - ทาน 2 เม็ด (พร้อม/หลังอาหารทันที)</option>
                                    <option value="Pioglitazone 30mg (1 เม็ด)" data-time="after">ไพโอกลิตาโซน (Pioglitazone) 30mg - ทาน 1 เม็ด (หลังอาหาร)</option>
                                    <option value="Pioglitazone 30mg (1/2 เม็ด)" data-time="after">ไพโอกลิตาโซน (Pioglitazone) 30mg - ทาน 1/2 เม็ด (หลังอาหาร)</option>
                                </optgroup>
                            </select>
                        </div>
                        <div class="col-md-4 mt-3 mt-md-0">
                            <label for="pillsCount" class="form-label required">จำนวนยาที่จ่าย (เม็ด)</label>
                            <input type="number" class="form-control form-select-lg" id="pillsCount" min="1" placeholder="เช่น 30" required>
                            <div class="form-text text-success" style="font-size: 0.8rem;">*ระบบจะหักลบอัตโนมัติเมื่อแจ้งเตือนผู้ป่วย</div>
                        </div>
                    </div>

                    <!-- ส่วนที่ 3: ตั้งเวลา -->
                    <div class="p-3 mb-4 rounded" style="background-color: #f8f9fa; border: 1px solid #dee2e6;">
                        <label class="form-label required mb-3">3. ตั้งวันที่และเวลาเริ่มทานยา</label>
                        
                        <div class="row">
                            <!-- ช่องเวลาก่อนอาหาร -->
                            <div class="col-md-6 mb-3" id="beforeField">
                                <label for="timeBefore" class="form-label text-primary">⏰ เวลาก่อนอาหาร (Before)</label>
                                <input type="datetime-local" class="form-control" id="timeBefore">
                                <div class="form-text">ระบบจะแจ้งเตือนล่วงหน้า 10 นาทีก่อนเวลานี้</div>
                            </div>
                            
                            <!-- ช่องเวลาหลังอาหาร -->
                            <div class="col-md-6 mb-3" id="afterField">
                                <label for="timeAfter" class="form-label text-warning" style="color: #d39e00 !important;">⏰ เวลาหลังอาหาร (After)</label>
                                <input type="datetime-local" class="form-control" id="timeAfter">
                                <div class="form-text">ระบบจะแจ้งเตือนล่วงหน้า 10 นาทีก่อนเวลานี้</div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">💾 บันทึกการตั้งค่าลงชีท</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ นำ Web App URL จาก Google Apps Script มาวางแทนที่ตรงนี้
        const SCRIPT_URL = "https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec"; 

        // 1. ฟังก์ชันโหลดรายชื่อผู้ป่วยจริงจากชีท pretest
        async function loadPatients() {
            try {
                const response = await fetch(SCRIPT_URL + "?action=getPatients");
                const patients = await response.json();
                
                const select = document.getElementById("patientSelect");
                select.innerHTML = '<option value="">-- กรุณาเลือกคนไข้ --</option>';
                
                patients.forEach(p => {
                    let option = document.createElement("option");
                    option.value = p.line_id;
                    option.text = p.line_name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error("Error loading patients", error);
                // Fallback แสดงกรณีติดต่อ Server ไม่ได้เพื่อทดสอบ UI
                const mockSelect = document.getElementById("patientSelect");
                mockSelect.innerHTML = `
                    <option value="">-- กรุณาเลือกคนไข้ (โหลดจริงล้มเหลว) --</option>
                    <option value="Ubb14a9e757138710939fd9b7d49efe3c">Thawatchai 慈德</option>
                    <option value="U174011434f0eb90f0b2950ad305c1610">Nanlaphas K.Beebo</option>
                `;
            }
        }

        // 2. จับคู่ชื่อเก็บบันทึกลงตัวแปรซ่อน
        document.getElementById("patientSelect").addEventListener("change", function() {
            const selectedOption = this.options[this.selectedIndex];
            document.getElementById("line_name").value = selectedOption.value ? selectedOption.text : "";
        });

        // 3. เปิด/ปิด การบันทึกเวลาตามประเภทเงื่อนไขยา
        function toggleTimeFields() {
            const medSelect = document.getElementById("medType");
            const selectedOption = medSelect.options[medSelect.selectedIndex];
            const timeRequired = selectedOption.getAttribute("data-time");
            
            const beforeInput = document.getElementById("timeBefore");
            const afterInput = document.getElementById("timeAfter");

            beforeInput.value = "";
            afterInput.value = "";

            if (timeRequired === "before") {
                beforeInput.disabled = false;
                beforeInput.required = true;
                afterInput.disabled = true;
                afterInput.required = false;
                document.getElementById("beforeField").style.opacity = "1";
                document.getElementById("afterField").style.opacity = "0.4";
            } else if (timeRequired === "after") {
                beforeInput.disabled = true;
                beforeInput.required = false;
                afterInput.disabled = false;
                afterInput.required = true;
                document.getElementById("beforeField").style.opacity = "0.4";
                document.getElementById("afterField").style.opacity = "1";
            } else {
                beforeInput.disabled = false;
                afterInput.disabled = false;
                document.getElementById("beforeField").style.opacity = "1";
                document.getElementById("afterField").style.opacity = "1";
            }
        }

        // 4. บันทึกข้อมูลส่งกลับไปที่ Google Sheet
        function saveMedicine(event) {
            event.preventDefault();
            
            const payload = {
                action: "saveMedicine",
                line_id: document.getElementById("patientSelect").value,
                line_name: document.getElementById("line_name").value,
                type: document.getElementById("medType").value,
                pills: document.getElementById("pillsCount").value,
                before: document.getElementById("timeBefore").value || "",
                after: document.getElementById("timeAfter").value || ""
            };

            Swal.fire({ title: 'กำลังบันทึกข้อมูลยาสู่ระบบ...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === "success") {
                    Swal.fire({ icon: 'success', title: 'บันทึกข้อมูลสำเร็จ!', text: 'ระบบตั้งค่ารอบทานยาเรียบร้อยแล้ว', timer: 2000, showConfirmButton: false });
                    document.getElementById("medicineForm").reset();
                    toggleTimeFields();
                } else {
                    Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาดจากระบบ', text: data.message });
                }
            })
            .catch(error => {
                console.error('Error:', error);
                Swal.fire({ icon: 'error', title: 'การเชื่อมต่อขัดข้อง', text: 'กรุณาตรวจสอบการตั้งค่า URL ของ Apps Script' });
            });
        }

        window.onload = function() {
            loadPatients();
            toggleTimeFields();
        };
    </script>
</body>
</html>
