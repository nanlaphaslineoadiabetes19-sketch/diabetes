<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตั้งค่าการทานยา</title>
  
  <!-- เรียกใช้ Bootstrap 5 เพื่อความสวยงามและ Responsive -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    body {
      background-color: #f4f7f6;
      font-family: 'Sarabun', sans-serif;
    }
    .card-form {
      max-width: 500px;
      margin: 20px auto;
      padding: 20px;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    /* ซ่อนกล่องตั้งค่าจำนวนยา/เวลาไว้ก่อน จะโชว์เมื่อติ๊ก Checkbox */
    .meal-setup {
      display: none; 
      padding: 10px; 
      border-left: 4px solid #0d6efd; 
      background-color: #f8f9fa; 
      margin-top: 10px;
      border-radius: 0 8px 8px 0;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card-form">
      <h3 class="text-center mb-4 text-primary">ตั้งค่าการจ่ายยาผู้ป่วย</h3>
      
      <form id="medForm" onsubmit="submitForm(event)">
        
        <!-- ข้อมูลผู้ป่วย (ซ่อนไว้) คุณสามารถดึงจาก LIFF หรือ URL Parameter มาใส่ value ได้ -->
        <input type="hidden" id="lineId" value="Uxxxxxxxxx_Dummy_ID">
        <input type="hidden" id="lineName" value="ชื่อผู้ป่วยทดสอบ">

        <!-- 1. เลือกชนิดยา -->
        <div class="mb-3">
          <label class="form-label fw-bold">1. ชื่อยา (Medicine Name)</label>
          <select class="form-select" id="medName" required>
            <option value="" disabled selected>-- เลือกชนิดยา --</option>
            <option value="Metformin 500mg">เมทฟอร์มิน (Metformin) 500mg</option>
            <option value="Glipizide 5mg">กลิพิไซด์ (Glipizide) 5mg</option>
            <option value="Pioglitazone 30mg">ไพโอกลิตาโซน (Pioglitazone) 30mg</option>
            <!-- เพิ่มชื่อยาอื่นๆ ตรงนี้ -->
          </select>
        </div>

        <!-- 2. ใส่จำนวนยาที่จ่าย (สต๊อกรวม) -->
        <div class="mb-4">
          <label class="form-label fw-bold">2. จำนวนยาที่จ่ายทั้งหมด (เม็ด)</label>
          <input type="number" class="form-control" id="totalPills" placeholder="ระบุจำนวนยาในกระปุก/แผง" required min="1">
        </div>

        <!-- 3. เลือกมื้ออาหาร -->
        <div class="mb-4">
          <label class="form-label fw-bold">3. เลือกมื้ออาหาร และตั้งเวลา (เลือกได้หลายมื้อ)</label>

          <!-- มื้อเช้า -->
          <div class="form-check mt-2">
            <input class="form-check-input" type="checkbox" id="chkMorning" onchange="toggleMeal('morning')">
            <label class="form-check-label text-success fw-bold">มื้อเช้า</label>
          </div>
          <div id="morningSetup" class="meal-setup row g-2">
            <div class="col-6">
              <label class="form-label small text-muted">จำนวนเม็ด</label>
              <input type="number" class="form-control form-control-sm" id="doseMorning" placeholder="เช่น 1 หรือ 2" min="1">
            </div>
            <div class="col-6">
              <label class="form-label small text-muted">เวลาแจ้งเตือน</label>
              <input type="time" class="form-control form-control-sm" id="timeMorning">
            </div>
          </div>

          <!-- มื้อกลางวัน -->
          <div class="form-check mt-3">
            <input class="form-check-input" type="checkbox" id="chkLunch" onchange="toggleMeal('lunch')">
            <label class="form-check-label text-warning fw-bold">มื้อกลางวัน</label>
          </div>
          <div id="lunchSetup" class="meal-setup row g-2">
            <div class="col-6">
              <label class="form-label small text-muted">จำนวนเม็ด</label>
              <input type="number" class="form-control form-control-sm" id="doseLunch" placeholder="เช่น 1 หรือ 2" min="1">
            </div>
            <div class="col-6">
              <label class="form-label small text-muted">เวลาแจ้งเตือน</label>
              <input type="time" class="form-control form-control-sm" id="timeLunch">
            </div>
          </div>

          <!-- มื้อเย็น -->
          <div class="form-check mt-3">
            <input class="form-check-input" type="checkbox" id="chkDinner" onchange="toggleMeal('dinner')">
            <label class="form-check-label text-info fw-bold">มื้อเย็น</label>
          </div>
          <div id="dinnerSetup" class="meal-setup row g-2">
            <div class="col-6">
              <label class="form-label small text-muted">จำนวนเม็ด</label>
              <input type="number" class="form-control form-control-sm" id="doseDinner" placeholder="เช่น 1 หรือ 2" min="1">
            </div>
            <div class="col-6">
              <label class="form-label small text-muted">เวลาแจ้งเตือน</label>
              <input type="time" class="form-control form-control-sm" id="timeDinner">
            </div>
          </div>
        </div>

        <hr>

        <button type="submit" class="btn btn-primary w-100 fw-bold py-2" id="btnSubmit">บันทึกข้อมูลลงระบบ</button>
      
      </form>
    </div>
  </div>

  <script>
    // ฟังก์ชันสำหรับ เปิด-ปิด กล่องตั้งค่าจำนวนยา/เวลา เมื่อติ๊ก Checkbox
    function toggleMeal(mealType) {
      // ทำให้อักษรตัวแรกพิมพ์ใหญ่เพื่อเรียก id ได้ตรงเป๊ะ (เช่น morning -> Morning)
      const capMeal = mealType.charAt(0).toUpperCase() + mealType.slice(1);
      
      const isChecked = document.getElementById('chk' + capMeal).checked;
      const setupBox = document.getElementById(mealType + 'Setup');
      
      if (isChecked) {
        setupBox.style.display = 'flex';
        // บังคับให้กรอกข้อมูลเมื่อติ๊กเลือกมื้อนี้
        document.getElementById('dose' + capMeal).required = true;
        document.getElementById('time' + capMeal).required = true;
      } else {
        setupBox.style.display = 'none';
        // ยกเลิกการบังคับกรอก และล้างค่าเดิมทิ้ง
        document.getElementById('dose' + capMeal).required = false;
        document.getElementById('time' + capMeal).required = false;
        document.getElementById('dose' + capMeal).value = '';
        document.getElementById('time' + capMeal).value = '';
      }
    }

    // ฟังก์ชันจัดการตอนกดปุ่ม "บันทึกข้อมูล"
    function submitForm(event) {
      event.preventDefault(); // ป้องกันเว็บ Refresh

      // เช็คก่อนว่าผู้ใช้ได้เลือกมื้ออาหารอย่างน้อย 1 มื้อหรือไม่
      const hasMorning = document.getElementById('chkMorning').checked;
      const hasLunch = document.getElementById('chkLunch').checked;
      const hasDinner = document.getElementById('chkDinner').checked;

      if (!hasMorning && !hasLunch && !hasDinner) {
        alert('กรุณาเลือกมื้ออาหารอย่างน้อย 1 มื้อครับ');
        return;
      }

      // ปิดปุ่มกดชั่วคราวเพื่อป้องกันการกดย้ำ (Double Submit)
      const btn = document.getElementById('btnSubmit');
      btn.disabled = true;
      btn.innerText = 'กำลังบันทึกข้อมูล...';

      // จัดรูป Object ข้อมูล เพื่อเตรียมส่งไปให้ Code.gs (รหัส.gs)
      const payload = {
        lineId: document.getElementById('lineId').value,
        lineName: document.getElementById('lineName').value,
        medName: document.getElementById('medName').value,
        totalPills: document.getElementById('totalPills').value,
        
        // ถ้าติ๊กมื้อไหน ให้เก็บ object ปริมาณ+เวลา เข้าไป, ถ้าไม่ติ๊กให้เป็น null
        morning: hasMorning ? {
          dose: document.getElementById('doseMorning').value,
          time: document.getElementById('timeMorning').value
        } : null,
        
        lunch: hasLunch ? {
          dose: document.getElementById('doseLunch').value,
          time: document.getElementById('timeLunch').value
        } : null,
        
        dinner: hasDinner ? {
          dose: document.getElementById('doseDinner').value,
          time: document.getElementById('timeDinner').value
        } : null
      };

      console.log("Data to send:", payload);

      // เรียกใช้ฟังก์ชัน saveMedicine ในไฟล์ รหัส.gs ผ่าน google.script.run
      google.script.run
        .withSuccessHandler(function(response) {
          alert('บันทึกข้อมูลเรียบร้อยแล้ว!');
          // เคลียร์ฟอร์ม
          document.getElementById('medForm').reset();
          // ซ่อนกล่องมื้ออาหารทั้งหมดกลับไปเหมือนเดิม
          ['morning', 'lunch', 'dinner'].forEach(m => toggleMeal(m));
          
          btn.disabled = false;
          btn.innerText = 'บันทึกข้อมูลลงระบบ';
        })
        .withFailureHandler(function(error) {
          alert('เกิดข้อผิดพลาด: ' + error.message);
          btn.disabled = false;
          btn.innerText = 'บันทึกข้อมูลลงระบบ';
        })
        .saveMedicine(payload); // <-- ส่งตัวแปร payload ไปให้ Apps Script
    }
  </script>
</body>
</html>
