<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งเวลาแจ้งเตือนทานยา - Admin</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body { background-color: #f4f7f6; font-family: 'Prompt', sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .card-header { background: linear-gradient(135deg, #0d6efd, #0dcaf0); color: white; border-radius: 15px 15px 0 0 !important; }
        .form-label { font-weight: 600; color: #495057; }
        .required::after { content: " *"; color: red; }
        .time-box { background-color: #f8f9fa; border: 1px solid #e9ecef; border-radius: 10px; padding: 15px; transition: 0.3s; }
        .time-box:focus-within { border-color: #0d6efd; background-color: #f1f8ff; box-shadow: 0 4px 10px rgba(13, 110, 253, 0.1); }
        .stock-box { border: 2px solid #495057; border-radius: 10px; padding: 15px; background-color: #fff; display: none; }
        .stock-box h6 { font-weight: 600; color: #333; margin-bottom: 15px; }
        
        .meal-section {
            border: 1px solid #dee2e6; /* เส้นขอบบางๆ */
            border-radius: 12px;       /* มุมมน */
            padding: 15px;             /* เว้นระยะขอบ */
            background-color: #ffffff; /* พื้นหลังสีขาว */
            margin-bottom: 20px;       /* เว้นระยะห่างระหว่างมื้อ */
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); /* เงาบางๆ ให้ดูมีมิติ */
        }
    </style>
</head>
<body class="p-3 p-md-4">

    <div class="container" style="max-width: 800px;">
        <div class="card">
            <div class="card-header p-4 text-center">
                <h3 class="mb-0">💊 ตั้งเวลาทานยา (Daily)</h3>
                <p class="mb-0 mt-1" style="font-size: 0.95rem; opacity: 0.9;">ระบบแจ้งเตือนทานยาประจำวัน</p>
            </div>
            
            <div class="card-body p-4 p-md-5">
                <form id="medicineForm" onsubmit="saveMedicine(event)">
                    
                    <!-- 1. เลือกรายชื่อ -->
                    <div class="mb-4">
                        <label for="patientSelect" class="form-label required">เลือกรายชื่อผู้ป่วย</label>
                        <select class="form-select form-select-lg" id="patientSelect" required>
                            <option value="">-- กำลังโหลดรายชื่อผู้ป่วย... --</option>
                        </select>
                        <input type="hidden" id="line_name">
                    </div>

                    <!-- 2. รายการยาคงเหลือ (จะแสดงเมื่อเลือกชื่อคน) -->
                    <div class="stock-box mb-4" id="stockBox">
                        <h6 id="stockHeader">📦 รายการยาคงเหลือ (เม็ด)</h6>
                        <div id="stockContent" class="row">
                            <!-- ข้อมูลยาจะถูกดึงมาแสดงที่นี่ -->
                        </div>
                    </div>

                    <!-- 📝 รายการยาที่สั่งจ่าย -->
                    <h5 class="fw-bold mb-3 text-primary mt-4">📝 รายการยาที่สั่งจ่าย</h5>
                    
                    <!-- มื้อเช้า -->
                    <div class="meal-section">
                        <h5 class="fw-bold mt-4 text-success">🌅 ยามื้อเช้า</h5>
                        <div class="row mb-2">
                            <div class="col-8">
                                <select class="form-select" id="medMorning">
                                    <option value="">-- เลือกยา --</option>
                                </select>
                            </div>
                            <div class="col-4">
                                <input type="number" class="form-control" id="doseMorning" placeholder="จำนวน(เม็ด)">
                            </div>
                        </div>
                        <!-- แถวสำหรับ ก่อน/หลัง -->
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label text-primary">ก่อนอาหาร</label>
                                <input type="time" class="form-control" id="timeMorningBefore">
                            </div>
                            <div class="col-6">
                                <label class="form-label text-warning">หลังอาหาร</label>
                                <input type="time" class="form-control" id="timeMorningAfter">
                            </div>
                        </div>
                    </div>
                    
                    <!-- มื้อกลางวัน -->
                    <div class="meal-section">
                        <h5 class="fw-bold mt-4 text-success">🌅 ยามื้อกลางวัน</h5>
                        <div class="row mb-2">
                            <div class="col-8">
                                <select class="form-select" id="medLunch">
                                    <option value="">-- เลือกยา --</option>
                                </select>
                            </div>
                            <div class="col-4">
                                <input type="number" class="form-control" id="doseLunch" placeholder="จำนวน(เม็ด)">
                            </div>
                        </div>
                        <!-- แถวสำหรับ ก่อน/หลัง -->
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label text-primary">ก่อนอาหาร</label>
                                <input type="time" class="form-control" id="timeLunchBefore">
                            </div>
                            <div class="col-6">
                                <label class="form-label text-warning">หลังอาหาร</label>
                                <input type="time" class="form-control" id="timeLunchAfter">
                            </div>
                        </div>
                    </div>
                    
                    <!-- มื้อเย็น -->
                    <div class="meal-section">
                        <h5 class="fw-bold mt-4 text-success">🌅 ยามื้อเย็น</h5>
                        <div class="row mb-2">
                            <div class="col-8">
                                <select class="form-select" id="medDinner">
                                    <option value="">-- เลือกยา --</option>
                                </select>
                            </div>
                            <div class="col-4">
                                <input type="number" class="form-control" id="doseDinner" placeholder="จำนวน(เม็ด)">
                            </div>
                        </div>
                        <!-- แถวสำหรับ ก่อน/หลัง -->
                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label text-primary">ก่อนอาหาร</label>
                                <input type="time" class="form-control" id="timeDinnerBefore">
                            </div>
                            <div class="col-6">
                                <label class="form-label text-warning">หลังอาหาร</label>
                                <input type="time" class="form-control" id="timeDinnerAfter">
                            </div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm" style="border-radius: 10px; font-weight: 600; letter-spacing: 1px;">
                        💾 บันทึก
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ นำ Web App URL ของคุณมาวางตรงนี้
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLuqh2ivMXanbpRRbFfhMeOElAFgyrWBkFOthPZzCTjiI0gWdy7rDXTiuYlpj2Lzyb/exec"; 

        async function loadPatients() {
            try {
                const response = await fetch(SCRIPT_URL + "?action=getPatients");
                const patients = await response.json();
                const select = document.getElementById("patientSelect");
                select.innerHTML = '<option value="">-- กรุณาเลือกคนไข้ --</option>';
                patients.forEach(p => {
                    let option = document.createElement("option");
                    option.value = p.line_id;
                    option.text = p.line_name;
                    select.appendChild(option);
                });
            } catch (error) {
                document.getElementById("patientSelect").innerHTML = '<option value="">-- โหลดรายชื่อล้มเหลว กรุณารีเฟรช --</option>';
            }
        }

        // ฟังก์ชันสำหรับใส่ชื่อยาเข้าไปในช่อง Select
        function populateMedSelects(medList) {
            console.log("กำลังจะเติมยา...", medList);
            
            if (!medList || medList.length === 0) {
                console.warn("ไม่พบรายการยาใน medList");
                return;
            }
            
            const selects = ["medMorning", "medLunch", "medDinner"];
            selects.forEach(selectId => {
                const select = document.getElementById(selectId);
                // เก็บ Option แรกไว้ (ที่เขียนว่า -- เลือกชื่อยา --)
                const firstOption = select.options[0];
                select.innerHTML = '';
                select.appendChild(firstOption);
        
                // เติมยาจาก Database เข้าไป
                medList.forEach(item => {
                    let option = document.createElement("option");
                    option.value = item.med_name; // ใช้ชื่อยาเป็น value
                    option.text = item.med_name;
                    select.appendChild(option);
                });
            });
        }

        // เมื่อเปลี่ยนชื่อคนไข้ ให้ดึงข้อมูลยาคงเหลือ
        document.getElementById("patientSelect").addEventListener("change", async function() {
            const opt = this.options[this.selectedIndex];
            const lineName = opt.value ? opt.text : "";
            const lineId = opt.value;
            
            document.getElementById("line_name").value = lineName;
            const stockBox = document.getElementById("stockBox");
            const stockContent = document.getElementById("stockContent");

            if (lineId) {
                stockBox.style.display = "block";
                stockContent.innerHTML = "<div class='col-12 text-muted'>กำลังโหลดข้อมูลยาคงเหลือ...</div>";
                
                try {
                    const response = await fetch(SCRIPT_URL + "?action=getMedStock&line_id=" + lineId);
                    const result = await response.json(); // result ที่ได้จะมี {list: [], totalSum: ...}
                    console.log("API ตอบกลับมาว่า:", result); // <--- เช็คบรรทัดนี้ใน Console ว่ามันมี list ส่งมาจริงไหม
                    
                    // เปลี่ยนหัวข้อเป็นจำนวนรวม
                    document.getElementById("stockHeader").innerText = "📦 รายการยาคงเหลือ (" + result.totalSum + " เม็ด)";
                    
                    if(result.list && result.list.length > 0) {
                        let html = "";
                        result.list.forEach((item, index) => {
                            html += `<div class="col-12 col-md-4 mb-2">${index+1}. ${item.med_name} <span class="float-end fw-bold text-primary">${item.total_pills} เม็ด</span></div>`;
                        });
                        stockContent.innerHTML = html;

                        // 🔥 เรียกฟังก์ชันเพิ่มชื่อยาลง Select ตรงนี้!
                        populateMedSelects(result.list);
                        
                    } else {
                        stockContent.innerHTML = "<div class='col-12 text-danger'>ไม่พบข้อมูลยาคงเหลือ</div>";
                    }
                } catch (error) {
                    console.error("Error เกิดจาก:", error); // <--- ถ้าพัง มันจะฟ้องที่นี่
                    stockContent.innerHTML = "<div class='col-12 text-danger'>เชื่อมต่อ Server ล้มเหลว</div>";
                }
            } else {
                stockBox.style.display = "none";
            }
        });

        function saveMedicine(event) {
            event.preventDefault();
            const payload = {
                action: "saveMedicineDaily",
                line_id: document.getElementById("patientSelect").value,
                line_name: document.getElementById("line_name").value,
                
                // มื้อเช้า + ชื่อยา
                med_morning: document.getElementById("medMorning").value,
                morning_before_dose: document.getElementById("doseMorning").value || 0, // ปรับ ID ให้ตรงกับ HTML
                morning_before_time: document.getElementById("timeMorningBefore").value,
                morning_after_dose: 0, // หรือเพิ่มช่องใน HTML ถ้าต้องการ
                morning_after_time: document.getElementById("timeMorningAfter").value,
                
                // มื้อกลางวัน + ชื่อยา
                med_lunch: document.getElementById("medLunch").value,
                lunch_before_dose: document.getElementById("doseLunch").value || 0,
                lunch_before_time: document.getElementById("timeLunchBefore").value,
                lunch_after_dose: 0,
                lunch_after_time: document.getElementById("timeLunchAfter").value,
                
                // มื้อเย็น + ชื่อยา
                med_dinner: document.getElementById("medDinner").value,
                dinner_before_dose: document.getElementById("doseDinner").value || 0,
                dinner_before_time: document.getElementById("timeDinnerBefore").value,
                dinner_after_dose: 0,
                dinner_after_time: document.getElementById("timeDinnerAfter").value
            };

            Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === "success") {
                    Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ!', text: 'ตั้งค่ารอบทานยาเรียบร้อยแล้ว', timer: 2000, showConfirmButton: false });
                    document.getElementById("medicineForm").reset();
                    document.getElementById("stockBox").style.display = "none";
                } else {
                    Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: data.message });
                }
            })
            .catch(error => {
                Swal.fire({ icon: 'error', title: 'การเชื่อมต่อขัดข้อง', text: 'กรุณาตรวจสอบอินเทอร์เน็ตหรือ URL' });
            });
        }


        // ฟังก์ชันดึงรายชื่อยาจาก Sheet
        async function loadMedicineList() {
            try {
                const response = await fetch(SCRIPT_URL + "?action=getMedicineList");
                const medList = await response.json();
                
                const selects = ["medMorning", "medLunch", "medDinner"];
                
                selects.forEach(selectId => {
                    const select = document.getElementById(selectId);
                    // ล้างค่าเก่า (ยกเว้นตัวเลือกแรก)
                    const firstOption = select.options[0];
                    select.innerHTML = '';
                    select.appendChild(firstOption);
                    
                    // ใส่ยาใหม่
                    medList.forEach(item => {
                        let option = document.createElement("option");
                        option.value = item.med_name;
                        option.text = item.med_name;
                        select.appendChild(option);
                    });
                });
            } catch (error) {
                console.error("โหลดรายการยาไม่สำเร็จ:", error);
            }
        }
        

        window.onload = function() { 
            loadPatients(); 
            loadMedicineList(); 
        };
    </script>
</body>
</html>
