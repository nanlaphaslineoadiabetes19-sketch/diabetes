<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การนอนหลับ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3498db;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            font-family: 'Sarabun', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .nav-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10000;
        }

        .btn-back {
            padding: 10px 22px;
            background-color: rgba(255, 255, 255, 0.85);
            color: #2c3e50;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(12px);
            transition: 0.3s;
            text-decoration: none;
        }

        .container {
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-wrapper {
            width: 100%;
            background: white;
            box-shadow: var(--shadow-soft);
            border-radius: 0 0 35px 35px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ส่วนหัวข้อ: เว้นระยะห่างให้สวยงาม */
        .content-header {
            padding: 40px 25px 30px;
            text-align: center;
            background: #fff;
        }

        /* ส่วนรวมรูปภาพ: ใช้ Flex เพื่อคุมระยะห่างให้เป็น 0 เป๊ะๆ */
        .image-gallery {
            display: flex;
            flex-direction: column;
            width: 100%;
            line-height: 0; /* กำจัดระยะห่างบรรทัด */
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
            border: none;
        }

        h1 { 
            color: #2c3e50; 
            font-size: 24px; 
            margin: 0 0 10px 0; 
            font-weight: 700;
            line-height: 1.4;
        }

        .subtitle {
            color: #34495e;
            font-size: 18px;
            font-weight: 400;
            line-height: 1.5;
            margin: 0;
        }

        footer {
            padding: 40px 20px;
            text-align: center;
            font-size: 13px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <button onclick="goBack()" class="btn-back"><span>⬅</span> ย้อนกลับ</button>
    </nav>

    <div class="container">
      <div class="main-wrapper">
            <img src="https://lh3.googleusercontent.com/d/1ZZEMlj48y1GkXCeWYl3DsurXMx43kC9J">

            <div class="image-gallery">
                <img src="https://lh3.googleusercontent.com/d/11I6PyWxPcwYksicUr9J2Gyjc1yDJswrk">
                <img src="https://lh3.googleusercontent.com/d/1o8JSdMyvbZ_gXFfeM5mtQdjl5dGPrCM7">
                <img src="https://lh3.googleusercontent.com/d/143QV1LIU2gAB0QqwvHWTauOII7xzKZmB">
                <img src="https://lh3.googleusercontent.com/d/17dVP8REXzkzgGxgYRfjrFG6_Mihps02k">
            </div>
      
          <footer>
            © 2026 ระบบดูแลเบาหวานด้วยตนเอง 
          </footer>
        </div>
    </div>

    <script>
        function goBack() {
            var currentPath = window.location.pathname;
            var directoryPath = currentPath.substring(0, currentPath.lastIndexOf('/'));
            location.href = directoryPath + '/sugartest.html';
        }
    </script>
</body>
</html>
