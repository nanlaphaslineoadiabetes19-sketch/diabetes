<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ระบบตอบกลับ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #06c755; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; background: #e5ddd5; }

        .nav-bar-fixed { position: fixed; top: 15px; left: 15px; z-index: 999; }
        .btn-back { padding: 10px 22px; background: rgba(255, 255, 255, 0.8); color: #555; border: 1px solid #ddd; border-radius: 50px; cursor: pointer; font-size: 15px; font-weight: 700; box-shadow: 0 4px 15px rgba(0,0,0,0.1); backdrop-filter: blur(8px); }

        /* Sidebar */
        #user-list { width: 320px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .list-header { padding: 20px; background: var(--primary); color: white; font-weight: bold; }
        .user-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .user-item:hover { background: #f8f9fa; }
        .new-msg-badge { background: red; color: white; border-radius: 50%; width: 20px; height: 20px; text-align: center; font-size: 12px; }

        /* Chat Panel */
        #chat-panel { flex: 1; display: flex; flex-direction: column; }
        #chat-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 70%; position: relative; }
        .sent { background: #ffffff; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .received { background: #dcf8c6; align-self: flex-end; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        footer { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
    </style>
</head>
<body>
    <div class="nav-bar-fixed">
        <button class="btn-back" onclick="goBackMain()">⬅ ย้อนกลับ</button>
    </div>
    
    <div id="user-list">
        <br><br><br><br>
        <div class="list-header">รายการสนทนา</div>
        <div id="list-container"></div>
    </div>
    <div id="chat-panel">
        <div id="chat-area">เลือกผู้ใช้งานเพื่อเริ่มสนทนา</div>
        <footer>
            <input type="text" id="reply-input" placeholder="พิมพ์ข้อความ...">
            <button onclick="sendReply()">ส่ง</button>
        </footer>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwLuqh2ivMXanbpRRbFfhMeOElAFgyrWBkFOthPZzCTjiI0gWdy7rDXTiuYlpj2Lzyb/exec";
        let currentUserId = null;

        const MY_LINE_ID = "Ubb14a9e757138710939fd9b7d49efe3c";

        // ฟังก์ชันตรวจสอบสิทธิ์ก่อนโหลดหน้าเว็บ
        async function initAdmin() {
            const response = await fetch(`${WEB_APP_URL}?action=checkAuth&id=${MY_LINE_ID}`);
            const result = await response.json();
            
            if (!result.authorized) {
                document.body.innerHTML = "<h1 style='text-align:center; margin-top:50px;'>ไม่มีสิทธิ์เข้าถึงระบบนี้</h1>";
                return;
            }
            // ถ้าผ่าน ให้รันระบบปกติ
            updateUI();
            setInterval(updateUI, 2000);
        }
    
        async function fetchLogs() {
            const res = await fetch(`${WEB_APP_URL}?action=getChatLogs`);
            return await res.json();
        }
    
        async function updateUI() {
            const logs = await fetchLogs();
            const container = document.getElementById("list-container");
            const userMap = {};
    
            for (let i = 1; i < logs.length; i++) {
                let row = logs[i];
                let id = row[1];
                let name = row[2];
                let status = String(row[5]).trim().toLowerCase();
                
                if (!id || String(id).toLowerCase() === 'lineid') continue;
                
                if (!userMap[id]) {
                    userMap[id] = { name: name, hasUnread: false };
                }
                // เงื่อนไข: ถ้าข้อความนั้น unread และ "ไม่ใช่คนที่กำลังคุยอยู่ตอนนี้" ให้โชว์ Badge
                if (status === 'unread' && id !== currentUserId) {
                    userMap[id].hasUnread = true;
                }
            }
    
            container.innerHTML = "";
            Object.keys(userMap).forEach(id => {
                const user = userMap[id];
                const div = document.createElement("div");
                div.className = "user-item";
                div.onclick = () => selectUser(id);
                
                div.innerHTML = `
                    <span>${user.name || 'ไม่มีชื่อ'}</span>
                    ${user.hasUnread ? '<div class="new-msg-badge">!</div>' : ''}
                `;
                container.appendChild(div);
            });
            
            // ถ้ากำลังดูแชทอยู่ ให้ refresh แชทอัตโนมัติ (ให้เร็วขึ้นเป็น 2 วินาที)
            if (currentUserId) selectUser(currentUserId);
        }
    
        async function selectUser(id) {
            currentUserId = id;
            const logs = await fetchLogs();
            const area = document.getElementById("chat-area");
            area.innerHTML = "";
            
            logs.filter(row => row[1] == id).forEach(row => {
                // แสดงวัน เดือน ปี และเวลา
                const dateObj = new Date(row[0]);
                const fullDateString = dateObj.toLocaleString('th-TH', { 
                    day: '2-digit', month: '2-digit', year: '2-digit', 
                    hour: '2-digit', minute: '2-digit' 
                });
                
                const div = document.createElement("div");
                div.className = `message ${row[4] == 'admin' ? 'received' : 'sent'}`;
                div.innerHTML = `<div>${row[3]}</div>
                                 <div style="font-size: 9px; opacity: 0.6; margin-top: 5px;">${fullDateString}</div>`;
                area.appendChild(div);
                
                // อ่านแล้วให้อัปเดตสถานะทันที
                if (String(row[5]).trim().toLowerCase() === 'unread') {
                    updateStatusToRead(id);
                }
            });
            area.scrollTop = area.scrollHeight;
        }

        async function sendReply() {
            const msgInput = document.getElementById("reply-input");
            const msg = msgInput.value;
            
            // ตรวจสอบว่าได้เลือกผู้ใช้งานและมีข้อความแล้วหรือไม่
            if (!currentUserId || !msg) {
                alert("กรุณาเลือกผู้ใช้งานและพิมพ์ข้อความก่อนครับ");
                return;
            }
            
            // ส่งข้อมูลไปบันทึก
            await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    action: "saveChat", 
                    line_id: currentUserId, 
                    message: msg, 
                    sender: "admin", 
                    status: "read" 
                })
            });
            
            // ล้างช่องพิมพ์และอัปเดตแชทให้เห็นข้อความล่าสุด
            msgInput.value = "";
            selectUser(currentUserId);
        }

        async function updateStatusToRead(id) {
            await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({ action: "markAsRead", line_id: id })
            });
        }
    
        // ปรับความเร็วการดึงข้อมูลเป็น 2 วินาทีเพื่อให้ดู Real-time มากขึ้น
        setInterval(updateUI, 2000);
        updateUI();
        initAdmin();

        function goBackMain() {
            window.location.href = 'https://liff.line.me/2009966517-pPEyRumg';
        }

    </script>
    
</body>
</html>
