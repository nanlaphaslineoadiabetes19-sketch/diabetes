<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ระบบตอบกลับ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #06c755; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; background: #e5ddd5; }
        
        /* Sidebar */
        #user-list { width: 320px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .list-header { padding: 20px; background: var(--primary); color: white; font-weight: bold; }
        .user-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .user-item:hover { background: #f8f9fa; }
        .new-msg-badge { background: red; color: white; border-radius: 50%; width: 20px; height: 20px; text-align: center; font-size: 12px; }

        /* Chat Panel */
        #chat-panel { flex: 1; display: flex; flex-direction: column; }
        #chat-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 70%; position: relative; }
        .sent { background: #ffffff; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .received { background: #dcf8c6; align-self: flex-end; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        footer { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
    </style>
</head>
<body>
    <div id="user-list">
        <div class="list-header">รายการสนทนา</div>
        <div id="list-container"></div>
    </div>
    <div id="chat-panel">
        <div id="chat-area">เลือกผู้ใช้งานเพื่อเริ่มสนทนา</div>
        <footer>
            <input type="text" id="reply-input" placeholder="พิมพ์ข้อความ...">
            <button onclick="sendReply()">ส่ง</button>
        </footer>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwLuqh2ivMXanbpRRbFfhMeOElAFgyrWBkFOthPZzCTjiI0gWdy7rDXTiuYlpj2Lzyb/exec";
        let currentUserId = null;
    
        // ดึงข้อมูลแชททั้งหมด
        async function fetchLogs() {
            const res = await fetch(`${WEB_APP_URL}?action=getChatLogs`);
            return await res.json();
        }
    
        async function updateUI() {
            const logs = await fetchLogs();
            const container = document.getElementById("list-container");
            
            // สร้าง Map เก็บข้อมูลล่าสุดของแต่ละคน
            const userMap = {};
            logs.forEach(row => {
                const id = row[1]; // line_id
                const name = row[2]; // line_name
                const status = row[5]; // status (คอลัมน์ F)
                
                if (!userMap[id]) {
                    userMap[id] = { name: name, hasUnread: false };
                }
                if (status === 'unread') {
                    userMap[id].hasUnread = true;
                }
            });
    
            container.innerHTML = "";
            Object.keys(userMap).forEach(id => {
                const user = userMap[id];
                const div = document.createElement("div");
                div.className = "user-item";
                div.onclick = () => selectUser(id);
                
                div.innerHTML = `
                    <span>${user.name || 'ไม่มีชื่อ'}</span>
                    ${user.hasUnread ? '<div class="new-msg-badge">!</div>' : ''}
                `;
                container.appendChild(div);
            });
    
            // ถ้ากำลังดูแชทอยู่ ให้ refresh แชทอัตโนมัติ
            if (currentUserId) selectUser(currentUserId);
        }
    
        async function selectUser(id) {
            currentUserId = id;
            const logs = await fetchLogs();
            const area = document.getElementById("chat-area");
            area.innerHTML = "";
            
            logs.filter(row => row[1] == id).forEach(row => {
                const div = document.createElement("div");
                div.className = `message ${row[4] == 'admin' ? 'received' : 'sent'}`;
                div.innerText = row[3];
                area.appendChild(div);
                
                // ถ้าแอดมินเปิดอ่านแล้ว ให้ส่งคำสั่งอัปเดตสถานะเป็น 'read'
                if (row[5] === 'unread') {
                    updateStatusToRead(id);
                }
            });
            area.scrollTop = area.scrollHeight;
        }
    
        // ฟังก์ชันอัปเดตสถานะใน Sheet
        async function updateStatusToRead(id) {
            await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({ action: "markAsRead", line_id: id })
            });
        }
    
        async function sendReply() {
            const msg = document.getElementById("reply-input").value;
            if (!currentUserId || !msg) return;
            
            await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({ action: "saveChat", line_id: currentUserId, message: msg, sender: "admin", status: "read" })
            });
            document.getElementById("reply-input").value = "";
            selectUser(currentUserId);
        }
    
        setInterval(updateUI, 5000);
        updateUI();
    </script>
    
</body>
</html>
