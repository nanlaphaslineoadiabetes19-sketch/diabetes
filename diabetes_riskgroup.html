<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ความรู้เบาหวาน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        padding: 20px 0;
        background-color: #f0f2f5;
        font-family: 'Sarabun', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        width: 100%;
        max-width: 600px;
        padding: 0 15px;
        box-sizing: border-box;
      }

      .nav-bar { width: 100%; margin-bottom: 15px; }

      .btn-back {
        padding: 10px 20px;
        background-color: #6c757d;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: 'Sarabun', sans-serif;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .main-wrapper {
        width: 100%;
        background: white;
        box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        border-radius: 12px;
        overflow: hidden;
        
        /* เทคนิคใหม่: ปิดช่องว่างด้วยการคุมบรรทัด */
        line-height: 0; 
        font-size: 0;
        letter-spacing: 0;
        word-spacing: 0;
      }

      img {
        width: 100%;
        height: auto;
        display: block; /* บังคับลบช่องว่างด้านล่าง */
        margin: 0;
        padding: 0;
        border: none;
        
        /* บังคับเกยกันแบบหนักๆ เพื่อความชัวร์ */
        margin-top: -3px; 
        
        /* ป้องกันเส้นขอบแปลกๆ ในบางเบราว์เซอร์ */
        image-rendering: -webkit-optimize-contrast; 
      }

      img:first-child {
        margin-top: 0; /* รูปแรกไม่ต้องดึงขึ้น */
      }
    </style>
  </head>
  <body>

    <div class="container">
      <div class="nav-bar">
        <button class="btn-back" onclick="goBack()">⬅ กลับหน้าหลัก</button>
      </div>

      <div class="main-wrapper">
        <img src="URL_รูปที่_1"><img src="URL_รูปที่_2">
      </div>
    </div>

    <script>
      function goBack() {
        var currentPath = window.location.pathname;
        var directoryPath = currentPath.substring(0, currentPath.lastIndexOf('/'));
        location.href = directoryPath + '/diabetes.html';
      }
    </script>
  </body>
</html>
