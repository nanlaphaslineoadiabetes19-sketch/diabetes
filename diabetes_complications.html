<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ภาวะแทรกซ้อนโรคเบาหวาน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        padding: 20px 0;
        background-color: #f0f2f5;
        font-family: 'Sarabun', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        width: 100%;
        max-width: 600px;
        padding: 0 15px;
        box-sizing: border-box;
      }

      .nav-bar {
        width: 100%;
        margin-bottom: 15px;
      }

      .btn-back {
        padding: 10px 20px;
        background-color: #6c757d;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: 'Sarabun', sans-serif;
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .main-wrapper {
        width: 100%;
        background: white;
        box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        border-radius: 12px;
        overflow: hidden;
        
        /* ท่าไม้ตาย: ใช้ Flexbox จัดรูปเรียงต่อกัน */
        display: flex;
        flex-direction: column;
        line-height: 0;
        font-size: 0;
      }

      img {
        width: 100.2%; /* ขยายออกนิดเดียวเพื่อป้องกันขอบขาวด้านข้าง */
        height: auto;
        display: block;
        margin: 0;
        padding: 0;
        border: none;
        outline: none;
        
        /* ให้รูปตัวล่างขยับขึ้นไปทับตัวบน 2px เพื่อปิดช่องว่าง */
        margin-top: -2px; 
      }

      /* รูปแรกสุดไม่ต้องขยับขึ้น */
      img:first-child {
        margin-top: 0;
      }
    </style>
  </head>
  <body>

    <div class="container">
      <div class="nav-bar">
        <button class="btn-back" onclick="goBack()">
          ⬅ กลับหน้าหลัก
        </button>
      </div>

      <div class="main-wrapper">
        <img src="https://lh3.googleusercontent.com/d/1MmTF4IYia8cJ7ZGzXC4l2FhjJfrWZ73X" alt="1"><img src="https://lh3.googleusercontent.com/d/1dtWlQGhpFHKAtg6JewWY2GaMuJx3yoy3" alt="2">
      </div>
    </div>

    <script>
      function goBack() {
        var currentPath = window.location.pathname;
        var directoryPath = currentPath.substring(0, currentPath.lastIndexOf('/'));
        location.href = directoryPath + '/diabetes.html';
      }
    </script>
  </body>
</html>
