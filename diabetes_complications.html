<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ภาวะแทรกซ้อนโรคเบาหวาน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f0f2f5;
        font-family: 'Sarabun', sans-serif;
      }

      /* แก้ชื่อคลาสให้ตรงกับ HTML และบังคับลอย */
      .nav-bar-fixed {
        position: fixed !important; /* บังคับให้ลอยค้างหน้าจอ */
        top: 20px !important;
        left: 20px !important;
        z-index: 99999 !important; /* อยู่ชั้นบนสุดเสมอ */
        width: auto;
      }

      .btn-back {
        padding: 10px 20px;
        background-color: rgba(108, 117, 125, 0.9);
        color: white;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        font-family: 'Sarabun', sans-serif;
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        backdrop-filter: blur(5px);
        transition: all 0.3s ease;
      }

      .btn-back:hover {
        background-color: #495057;
        transform: scale(1.05);
      }

      .container {
        width: 100%;
        max-width: 600px;
        padding: 80px 15px 40px 15px; /* เว้นด้านบนไว้หลบปุ่ม */
        box-sizing: border-box;
        margin: 0 auto;
      }

      .main-wrapper {
        width: 100%;
        background: white;
        box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        line-height: 0;
        font-size: 0;
      }

      img {
        width: 100%; 
        height: auto;
        display: block;
        margin: 0;
        padding: 0;
        border: none;
        margin-top: -2px; /* ปิดรอยต่อระหว่างภาพ */
      }

      img:first-child {
        margin-top: 0;
      }
    </style>
  </head>
  <body>

    <div class="nav-bar-fixed">
      <button class="btn-back" onclick="goBack()">
        ⬅ กลับหน้าหลัก
      </button>
    </div>

    <div class="container">
      <div class="main-wrapper">
        <img src="https://lh3.googleusercontent.com/d/1MmTF4IYia8cJ7ZGzXC4l2FhjJfrWZ73X" alt="1"><img src="https://lh3.googleusercontent.com/d/1dtWlQGhpFHKAtg6JewWY2GaMuJx3yoy3" alt="2">
      </div>
    </div>

    <script>
      function goBack() {
        var currentPath = window.location.pathname;
        var directoryPath = currentPath.substring(0, currentPath.lastIndexOf('/'));
        location.href = directoryPath + '/diabetes.html';
      }
    </script>
  </body>
</html>
