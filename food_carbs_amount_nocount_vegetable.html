<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หมวดผัก</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-food: #e67e22; /* สีส้มอาหาร */
            --text-dark: #2c3e50;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #fff5e6 0%, #f4f7f6 100%);
            font-family: 'Sarabun', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* ชิดบน */
            min-height: 100vh;
        }

        /* Nav Bar Fixed แบบหรูหราเหมือนหน้าอื่นๆ */
        .nav-bar {
            position: fixed !important;
            top: 15px !important;
            left: 15px !important;
            z-index: 99999 !important;
        }

        .btn-back {
            padding: 10px 22px;
            background-color: rgba(255, 255, 255, 0.85);
            color: #555;
            border: 1px solid #ddd;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Sarabun', sans-serif;
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(8px);
            transition: 0.3s;
        }

        .btn-back:hover {
            background-color: white;
            transform: scale(1.05);
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0; /* ชิดบนสุด */
        }

        .main-wrapper {
            width: 100%;
            background: white;
            box-shadow: 0 0 40px rgba(0,0,0,0.05);
            border-radius: 0 0 30px 30px;
            overflow: hidden;
            display: flex;
            text-align: center;
            flex-direction: column;
            text-align: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* ส่วนเนื้อหาที่เป็นข้อความ */
        .content-header {
            padding: 40px 25px 20px; /* เว้นด้านบนเพื่อให้ไอคอนขยับขึ้นไปสวยๆ */
            text-align: center;
        }

        .icon-header {
            font-size: 75px;
            margin-bottom: 5px;
            margin-top: 0;
            line-height: 1;
            display: block;
        }

        h1 { 
            color: var(--text-dark); 
            font-size: 26px; 
            margin-bottom: 15px; 
            font-weight: 700;
            line-height: 1.3;
        }

        h2 {
            color: #7f8c8d;
            font-size: 16px;
            font-weight: 400;
            line-height: 1.7;
            margin-bottom: 20px;
            text-align: center;
        }

        /* การจัดการรูปภาพ */
        .image-gallery {
            font-size: 0; /* ลบช่องว่างระหว่างภาพ */
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
        }

        footer {
            padding: 30px 20px;
            text-align: center;
            font-size: 12px;
            color: #bdc3c7;
            background: #fff;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="btn-back" onclick="goBack()">
            ⬅ ย้อนกลับ
        </button>
    </div>

    <div class="container">
        <div class="main-wrapper">
            <div class="content-header">
              <h2>เมื่อรับประทานเข้าไปแล้วจะไม่มีผลต่อระดับน้ำตาลในเลือดหรือมีผลน้อยมาก</h2>
                <div class="icon-header">🥬</div>
                <h1>หมวดผัก</h1>
                <h2>ควรรับประทานผักในกลุ่มนี้อย่างน้อย 1-2 ส่วน ในแต่ละมื้อ เพื่อให้ได้ใยอาหารและวิตามินที่ดีต่อร่างกาย โดยเน้นเป็นผักลวก ผักต้ม หรือผักนึ่ง</h2>
                
                <h1 style="font-size: 20px; color: var(--primary-food); margin-top: 30px;">
                    ตัวอย่างอาหารหมวดผักปริมาณ 1 ส่วน
                </h1>
            </div>

            <div class="image-gallery">
              <img src="https://lh3.googleusercontent.com/d/1WptmWJXRsPGQR1HpjFmJjCR4UHUzWgEl">
              <img src="https://lh3.googleusercontent.com/d/1XRI94_CylXm3_pjKqwLz0k04SH6QGDj4">
              <img src="https://lh3.googleusercontent.com/d/1nOkwqc2C_PAjkAIAtcOSzeWMZj8WHJdq">
              <img src="https://lh3.googleusercontent.com/d/1QdD7KYRj80KsEfb5if0XesVEthz43SUl">
              <img src="https://lh3.googleusercontent.com/d/18Obx-GdIBAzLT3Q8vU6XvZmSWUaIiSu1">
              <img src="https://lh3.googleusercontent.com/d/1SmKnUIc-lb569_ga0JBJSYd2zTZHklhs">
              <img src="https://lh3.googleusercontent.com/d/1zN7om4Edb_qcFW8SQ1MnjLFoOQA7GSbN">
              <img src="https://lh3.googleusercontent.com/d/1uEhPQOX9RcQyNotUP_V48ZP1ZplPrH0-">
              <img src="https://lh3.googleusercontent.com/d/1uj7ObLBC1PfMFkecwWQWNU5yj-QxNqGp">
              <img src="https://lh3.googleusercontent.com/d/1qmBdy0O4rraGcHMYNmqxlpC6f5njjQFn">
              <img src="https://lh3.googleusercontent.com/d/14WbypqYFgc1-1y4Nr_U6mFJ6-Dlw4Osm">
            </div>

            <footer>© 2026 ระบบดูแลเบาหวานด้วยตนเอง</footer>
        </div>
    </div>

    <script>
        function goBack() {
            var currentPath = window.location.pathname;
            var directoryPath = currentPath.substring(0, currentPath.lastIndexOf('/'));
            // แก้ไข Path ให้ตรงตามที่คุณต้องการ
            location.href = directoryPath + '/food_carbs_amount_count.html';
        }
    </script>
</body>
</html>
