<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ขั้นตอนการตรวจน้ําตาลในเลือดด้วยตนเอง</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3498db;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            font-family: 'Sarabun', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Nav Bar สไตล์ลอยตัวแบบโมเดิร์น */
        .nav-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 10000;
        }

        .btn-back {
            padding: 10px 22px;
            background-color: rgba(255, 255, 255, 0.85);
            color: #2c3e50;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Sarabun', sans-serif;
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-back:hover {
            background-color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.15);
        }

        .container {
            width: 100%;
            max-width: 500px; /* ขนาดกำลังดีสำหรับอ่านบนมือถือ */
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-wrapper {
            width: 100%;
            background: white;
            box-shadow: 0 0 40px rgba(0,0,0,0.05);
            border-radius: 0 0 30px 30px;
            overflow: hidden;
            text-align: center;
            display: flex;
            flex-direction: column;
            text-align: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
            border: none;
            vertical-align: bottom;
        }

        /* Footer ดีไซน์สะอาดตา */
        footer {
            padding: 40px 20px;
            text-align: center;
            font-size: 13px;
            color: #7f8c8d;
            background: transparent;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="btn-back" onclick="goBack()">
            <span style="font-size: 18px;">⬅</span> ย้อนกลับ
        </button>
    </div>

    <div class="container">
        <div class="main-wrapper">
          <br><br><br>
            <img src="https://drive.google.com/thumbnail?id=1edRZN_CA1jIlX5b3QbFSOIyWB8vbBNah&sz=w1000">
            <img src="https://drive.google.com/thumbnail?id=1HLmxbsUbV1VGLc0aLwjvJY9qjgJkXi6p&sz=w1000">
            <img src="https://drive.google.com/thumbnail?id=1ZCCidRbk_BSINnanXFJwjFjg21bMdFYi&sz=w1000">
            
          <footer>
            © 2026 ระบบดูแลเบาหวานด้วยตนเอง 
          </footer>
        </div>
    </div>

    <script>
        function goBack() {
            var currentPath = window.location.pathname;
            var directoryPath = currentPath.substring(0, currentPath.lastIndexOf('/'));
            location.href = directoryPath + '/sugartest.html';
        }
    </script>
</body>
</html>
