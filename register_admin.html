<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนผู้ดูแลระบบ - Nurse System</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --primary: #2e7d32;
            --primary-hover: #1b5e20;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text-dark: #333333;
            --text-muted: #666666;
        }

        * { box-sizing: border-box; font-family: 'Sarabun', sans-serif; }

        body {
            background-color: var(--bg); margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
        }

        .register-card {
            background: var(--card-bg); width: 100%; max-width: 400px;
            padding: 30px 24px; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            text-align: center; display: none;
        }

        .icon-box {
            width: 70px; height: 70px; background: #e8f5e9; color: var(--primary);
            border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px;
        }
        .icon-box svg { width: 35px; height: 35px; fill: currentColor; }

        h2 { margin: 0 0 10px 0; font-size: 22px; color: var(--text-dark); }
        .desc { color: var(--text-muted); font-size: 14px; margin-bottom: 25px; line-height: 1.5; }

        .profile-area {
            background: #f8f9fa; padding: 15px; border-radius: 12px;
            display: flex; align-items: center; gap: 15px; margin-bottom: 25px; text-align: left;
            border: 1px solid #eeeeee;
        }
        .profile-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .profile-info h3 { margin: 0; font-size: 16px; color: var(--text-dark); }
        .profile-info p { margin: 2px 0 0 0; font-size: 12px; color: var(--text-muted); }

        .btn-submit {
            background: var(--primary); color: white; border: none; width: 100%;
            padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-submit:active { background: var(--primary-hover); }

        /* Loading Screen */
        .loading-screen { text-align: center; }
        .spinner {
            width: 45px; height: 45px; border: 4px solid #ddd;
            border-top: 4px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingScreen" class="loading-screen">
        <div class="spinner"></div>
        <h3>กำลังดึงข้อมูลโปรไฟล์...</h3>
    </div>

    <div id="registerCard" class="register-card">
        <div class="icon-box">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
        <h2>ลงทะเบียน Admin ใหม่</h2>
        <p class="desc">คุณได้รับคำเชิญให้เป็นผู้ดูแลระบบ (Admin)<br>กรุณายืนยันข้อมูลด้านล่างเพื่อเปิดสิทธิ์เข้าใช้งาน</p>

        <div class="profile-area">
            <img id="userImg" src="https://via.placeholder.com/50" alt="Profile" class="profile-img">
            <div class="profile-info">
                <h3 id="userName">กำลังโหลดชื่อ...</h3>
                <p id="userId">LINE ID: -</p>
            </div>
        </div>

        <button class="btn-submit" onclick="submitRegistration()">ยืนยันเปิดสิทธิ์ Admin</button>
    </div>

    <script>
        // 🌟 ใส่ข้อมูลเดิมของคุณให้ตรงกับไฟล์ nurse.html
        const LIFF_ID = '2009966517-pPEyRumg'; 
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwLuqh2ivMXanbpRRbFfhMeOElAFgyrWBkFOthPZzCTjiI0gWdy7rDXTiuYlpj2Lzyb/exec';
        
        let targetUser = { userId: '', displayName: '' };

        async function initRegister() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                
                const profile = await liff.getProfile();
                targetUser.userId = profile.userId;
                targetUser.displayName = profile.displayName;

                // แสดงข้อมูลบนหน้าจอ
                document.getElementById('userImg').src = profile.pictureUrl || 'https://via.placeholder.com/50';
                document.getElementById('userName').innerText = profile.displayName;
                document.getElementById('userId').innerText = `ID: ${profile.userId.substring(0, 10)}...`;

                // สลับหน้าจอจากโหลด เป็นหน้าลงทะเบียน
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('registerCard').style.display = 'block';

            } catch (err) {
                console.error("LIFF Error:", err);
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อระบบ LINE ได้', 'error');
            }
        }

        async function submitRegistration() {
            Swal.fire({
                title: 'กำลังบันทึกข้อมูล...',
                text: 'กรุณารอสักครู่ระบบกำลังบันทึกสิทธิ์',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                // ส่งข้อมูลไปที่ Apps Script โดยสั่ง type=registerAdmin
                const response = await fetch(`${SCRIPT_URL}?type=registerAdmin&line_id=${targetUser.userId}&line_name=${encodeURIComponent(targetUser.displayName)}`);
                const data = await response.json();

                if (data.success) {
                    Swal.fire({
                        title: 'ลงทะเบียนสำเร็จ!',
                        text: 'คุณได้สิทธิ์เป็น Admin เรียบร้อยแล้ว',
                        icon: 'success',
                        confirmButtonColor: '#2e7d32'
                    }).then(() => {
                        // เมื่อสำเร็จ ให้ปิดหน้าต่าง LIFF ไปเลย
                        liff.closeWindow();
                    });
                } else {
                    Swal.fire('เกิดข้อผิดพลาด', data.message || 'ไม่สามารถบันทึกข้อมูลได้', 'error');
                }
            } catch (error) {
                console.error(error);
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อกับฐานข้อมูลระบบได้', 'error');
            }
        }

        initRegister();
    </script>
</body>
</html>
