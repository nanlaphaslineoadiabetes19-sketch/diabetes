<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกค่าน้ำตาลในเลือด</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-color: #2e7d32; 
            --primary-hover: #1b5e20;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --border-color: #e0e0e0;
            --edit-color: #f57c00;
            --delete-color: #d32f2f;
        }
        body {
            font-family: 'Sarabun', sans-serif; background-color: var(--bg-color);
            margin: 0; display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; padding: 30px 20px; box-sizing: border-box;
        }
        .container {
            width: 100%; max-width: 750px; display: flex; flex-direction: column; gap: 25px;
        }
        .form-card, .history-card {
            background-color: var(--card-bg); width: 100%;
            padding: 35px 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            box-sizing: border-box;
        }
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { margin: 0; color: var(--primary-color); font-weight: 600; font-size: 24px; }
        .header p { margin: 5px 0 0; color: #666; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-main); font-weight: 600; font-size: 15px; }
        select, input[type="number"] {
            width: 100%; padding: 14px 16px; border: 1.5px solid var(--border-color);
            border-radius: 10px; font-size: 16px; font-family: 'Sarabun', sans-serif;
            box-sizing: border-box; background-color: #fafafa; transition: all 0.3s ease;
        }
        select:focus, input[type="number"]:focus {
            outline: none; border-color: var(--primary-color); background-color: #fff;
            box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.1);
        }
        .btn-submit {
            width: 100%; padding: 16px; background-color: var(--primary-color); color: white;
            border: none; border-radius: 10px; font-size: 18px; font-weight: 600;
            font-family: 'Sarabun', sans-serif; cursor: pointer;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.2); transition: all 0.3s ease;
        }
        .btn-submit:hover { background-color: var(--primary-hover); }
        
        /* 🌟 ส่วนตกแต่งตารางประวัติระดับมืออาชีพ */
        .history-card { display: none; } /* ซ่อนไว้ก่อนจนกว่าจะเลือกผู้ป่วย */
        .card-title {
            font-size: 18px; font-weight: 600; color: #333; margin-top: 0; margin-bottom: 20px;
            border-left: 4px solid var(--primary-color); padding-left: 10px;
        }
        .table-responsive { width: 100%; overflow-x: auto; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 15px; min-width: 550px; }
        th { background-color: #f8f9fa; color: #555; font-weight: 600; padding: 14px 16px; border-bottom: 2px solid #eee; }
        td { padding: 14px 16px; border-bottom: 1px solid #eee; color: #444; vertical-align: middle; }
        tr:hover { background-color: #fcfdfc; }
        
        .sugar-badge {
            background-color: #edf7ed; color: var(--primary-color); font-weight: 600;
            padding: 4px 10px; border-radius: 6px; display: inline-block;
        }
        .time-text { font-size: 12px; color: #777; display: block; margin-top: 2px; }
        
        /* ปุ่มจัดการระบบ */
        .btn-action-group { display: flex; gap: 8px; }
        .btn-action {
            padding: 6px 12px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600;
            font-family: 'Sarabun', sans-serif; cursor: pointer; transition: all 0.2s ease;
        }
        .btn-edit { background-color: #fff3e0; color: var(--edit-color); }
        .btn-edit:hover { background-color: var(--edit-color); color: #fff; }
        .btn-delete { background-color: #ffebee; color: var(--delete-color); }
        .btn-delete:hover { background-color: var(--delete-color); color: #fff; }
        
        #table-loading { text-align: center; color: #888; padding: 20px 0; }
    </style>
</head>
<body>

    <div class="container">
        <div class="form-card">
            <div class="header">
                <h2>บันทึกค่าน้ำตาลในเลือด</h2>
                <p>ระบบติดตามข้อมูลผู้ป่วยเบาหวาน</p>
            </div>

            <form id="bloodSugarForm">
                <div class="form-group">
                    <label for="userSelect">ชื่อ-นามสกุล ผู้เข้าร่วมโครงการ</label>
                    <select id="userSelect" required>
                        <option value="" disabled selected>กำลังโหลดรายชื่อ...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="bloodsugar">ค่าน้ำตาลในเลือด (mg/dL)</label>
                    <input type="number" id="bloodsugar" placeholder="ระบุค่าน้ำตาล (เช่น 95.5 หรือ 120)" required min="0.1" step="any">
                </div>

                <button type="submit" class="btn-submit">บันทึกข้อมูล</button>
            </form>
        </div>

        <div class="history-card" id="historyCard">
            <h3 class="card-title">ประวัติการบันทึกค่าน้ำตาล</h3>
            <div id="table-loading">กำลังโหลดประวัติข้อมูล...</div>
            <div class="table-responsive" id="tableWrapper" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 10%;">No.</th>
                            <th style="width: 40%;">Line Name / วันเวลา</th>
                            <th style="width: 25%;">Bloodsugar</th>
                            <th style="width: 25%; text-align: center;">จัดการข้อมูล</th>
                        </tr>
                    </thead>
                    <tbody id="historyTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwLuqh2ivMXanbpRRbFfhMeOElAFgyrWBkFOthPZzCTjiI0gWdy7rDXTiuYlpj2Lzyb/exec'; 

        document.addEventListener('DOMContentLoaded', loadUsers);
        document.getElementById('userSelect').addEventListener('change', function() {
            loadHistoryTable(this.value);
        });

        async function loadUsers() {
            const select = document.getElementById('userSelect');
            try {
                const response = await fetch(SCRIPT_URL + '?type=getUsers');
                const users = await response.json();
                select.innerHTML = '<option value="" disabled selected>-- กรุณาเลือกชื่อผู้ป่วย --</option>';
                
                if(users.error) {
                    select.innerHTML = `<option value="" disabled selected>${users.error}</option>`;
                    return;
                }

                users.forEach(user => {
                    const option = document.createElement('option');
                    option.value = user.line_id;
                    option.textContent = user.line_name;
                    option.setAttribute('data-name', user.line_name);
                    select.appendChild(option);
                });
            } catch (error) {
                console.error("Error:", error);
                select.innerHTML = '<option value="" disabled selected>เกิดข้อผิดพลาดในการโหลดรายชื่อ</option>';
            }
        }

        // 🌟 ฟังก์ชันโหลดประวัติลงตาราง
        async function loadHistoryTable(lineId) {
            const card = document.getElementById('historyCard');
            const loading = document.getElementById('table-loading');
            const wrapper = document.getElementById('tableWrapper');
            const tbody = document.getElementById('historyTableBody');
            
            card.style.display = 'block';
            loading.style.display = 'block';
            wrapper.style.display = 'none';
            tbody.innerHTML = '';

            try {
                const response = await fetch(`${SCRIPT_URL}?type=getHistoryTable&line_id=${lineId}`);
                const data = await response.json();
                loading.style.display = 'none';

                if (!Array.isArray(data) || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#999; padding:30px 0;">ไม่พบประวัติการบันทึกข้อมูลของผู้ป่วยรายนี้</td></tr>';
                    wrapper.style.display = 'block';
                    return;
                }

                data.forEach((item, index) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-weight: 600; color:#777;">${index + 1}</td>
                        <td>
                            <strong style="color:#222;">${item.name}</strong>
                            <span class="time-text">${item.dateTime}</span>
                        </td>
                        <td><span class="sugar-badge">${item.bloodsugar} mg/dL</span></td>
                        <td>
                            <div class="btn-action-group" style="justify-content: center;">
                                <button class="btn-action btn-edit" onclick="openEditModal(${item.row}, '${item.isoDate}', ${item.bloodsugar}, '${item.name}')">แก้ไข</button>
                                <button class="btn-action btn-delete" onclick="openDeleteModal(${item.row}, '${item.name}', ${item.bloodsugar})">ลบ</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                wrapper.style.display = 'block';
            } catch (error) {
                console.error(error);
                loading.innerHTML = '<span style="color:red;">ไม่สามารถโหลดข้อมูลประวัติได้</span>';
            }
        }

        // 🌟 ระบบ Popup ฟอร์มแก้ไขข้อมูล (Edit Modal)
        async function openEditModal(row, isoDate, currentSugar, name) {
            const lineId = document.getElementById('userSelect').value;

            const { value: formValues } = await Swal.fire({
                title: 'แก้ไขบันทึกข้อมูล',
                text: `ผู้ป่วย: คุณ ${name}`,
                html: `
                    <div style="text-align: left; margin-bottom: 6px;"><label style="font-weight:600; font-size:14px;">วัน-เวลาตรวจย้อนหลัง:</label></div>
                    <input id="swal-date" type="datetime-local" class="swal2-input" style="margin: 0 0 15px 0; width: 85%; font-family: 'Sarabun';" value="${isoDate}">
                    <div style="text-align: left; margin-bottom: 6px;"><label style="font-weight:600; font-size:14px;">ค่าน้ำตาลในเลือด (mg/dL):</label></div>
                    <input id="swal-sugar" type="number" step="any" class="swal2-input" style="margin: 0; width: 85%; font-family: 'Sarabun';" value="${currentSugar}">
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'บันทึกการแก้ไข',
                cancelButtonText: 'ยกเลิก',
                confirmButtonColor: '#2e7d32',
                preConfirm: () => {
                    return {
                        newDate: document.getElementById('swal-date').value,
                        newSugar: document.getElementById('swal-sugar').value
                    }
                }
            });

            if (formValues) {
                if(!formValues.newDate || !formValues.newSugar) {
                    Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลให้ครบถ้วน', 'warning');
                    return;
                }

                // สั่งขึ้น Loading รอระบบยิงข้อมูลไป Sheets
                Swal.fire({ title: 'กำลังปรับปรุงข้อมูล...', didOpen: () => { Swal.showLoading(); } });

                let formData = new URLSearchParams();
                formData.append('action', 'update');
                formData.append('row', row);
                formData.append('line_id', lineId);
                formData.append('new_date', formValues.newDate);
                formData.append('new_bloodsugar', formValues.newSugar);

                try {
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
                    const result = await response.json();
                    if(result.status === 'success') {
                        Swal.fire('สำเร็จ!', 'แก้ไขข้อมูลเรียบร้อยแล้ว', 'success');
                        loadHistoryTable(lineId); // รีโหลดตารางให้เห็นการเปลี่ยนแปลง
                    } else {
                        throw new Error(result.message);
                    }
                } catch (error) {
                    Swal.fire('ล้มเหลว', 'ไม่สามารถแก้ไขข้อมูลได้: ' + error.message, 'error');
                }
            }
        }

        // 🌟 ระบบถามย้ำเพื่อความแน่ใจก่อนทำการลบ (Delete Modal)
        function openDeleteModal(row, name, sugar) {
            const lineId = document.getElementById('userSelect').value;

            Swal.fire({
                title: 'ยืนยันการลบข้อมูล?',
                text: `คุณกำลังจะลบรายการค่าน้ำตาล ${sugar} mg/dL ของคุณ ${name} ออกจากระบบอย่างถาวร!`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d32f2f',
                cancelButtonColor: '#666',
                confirmButtonText: 'ใช่, ฉันต้องการลบ',
                cancelButtonText: 'ยกเลิก'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({ title: 'กำลังลบข้อมูลออกจากระบบ...', didOpen: () => { Swal.showLoading(); } });

                    let formData = new URLSearchParams();
                    formData.append('action', 'delete');
                    formData.append('row', row);
                    formData.append('line_id', lineId);

                    try {
                        const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
                        const result = await response.json();
                        if(result.status === 'success') {
                            Swal.fire('ลบสำเร็จ!', 'ลบรายการข้อมูลเรียบร้อยแล้ว', 'success');
                            loadHistoryTable(lineId); // รีโหลดตารางใหม่
                        } else {
                            throw new Error(result.message);
                        }
                    } catch (error) {
                        Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถลบข้อมูลได้: ' + error.message, 'error');
                    }
                }
            });
        }

        // ระบบบันทึกข้อมูลใหม่ (ของเดิม แต่เพิ่มสั่งให้โหลดตารางซ้ำอัตโนมัติเมื่อกดบันทึกสำเร็จ)
        document.getElementById('bloodSugarForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const select = document.getElementById('userSelect');
            const selectedOption = select.options[select.selectedIndex];
            const lineId = selectedOption.value;
            const lineName = selectedOption.getAttribute('data-name');
            const bloodsugarValue = document.getElementById('bloodsugar').value;

            Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

            let formData = new URLSearchParams();
            formData.append('line_id', lineId);
            formData.append('line_name', lineName);
            formData.append('bloodsugar', bloodsugarValue);

            try {
                const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
                const result = await response.json();

                if (result.status === 'success') {
                    await Swal.fire({
                        icon: 'success',
                        title: 'บันทึกสำเร็จ',
                        text: `บันทึกค่าน้ำตาล ${bloodsugarValue} mg/dL ของคุณ ${lineName} เรียบร้อยแล้ว`,
                        confirmButtonColor: '#2e7d32'
                    });
                    document.getElementById('bloodsugar').value = '';
                    loadHistoryTable(lineId); // 🌟 จุดเด่น: สั่งโหลดตารางซ้ำทันที ข้อมูลใหม่โผล่ทันตาไม่ต้องกดรีเฟรช
                } else {
                    throw new Error(result.message || 'Server error');
                }
            } catch (error) {
                console.error(error);
                Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: 'ไม่สามารถบันทึกข้อมูลได้', confirmButtonColor: '#d33' });
            }
        });
    </script>
</body>
</html>
