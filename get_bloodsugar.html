<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>บันทึกค่าน้ำตาลสะสม</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        * { box-sizing: border-box !important; }
        :root {
            --primary-color: #2e7d32; --primary-hover: #1b5e20;
            --bg-color: #f4f7f6; --card-bg: #ffffff; --text-main: #333333;
            --border-color: #e0e0e0; --edit-color: #f57c00; --delete-color: #d32f2f;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        body { margin: 0; padding: 0; background-color: var(--bg-color); font-family: 'Sarabun', sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .nav-bar-fixed { position: fixed; top: 15px; left: 15px; z-index: 999; }
        .btn-back { padding: 10px 22px; background: rgba(255, 255, 255, 0.8); color: #555; border: 1px solid #ddd; border-radius: 50px; cursor: pointer; font-size: 15px; font-weight: 700; box-shadow: 0 4px 15px rgba(0,0,0,0.1); backdrop-filter: blur(8px); }
        .container { max-width: 500px; width: 100%; background: #fff; box-shadow: var(--shadow); padding: 80px 25px 40px; min-height: 100vh; }
        .form-card, .history-section { background-color: var(--card-bg); width: 100%; padding: 10px 0; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { margin: 0; color: var(--primary-color); font-size: 22px; }
        .header p { margin: 5px 0 0; color: #666; font-size: 13px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--text-main); font-weight: 600; font-size: 15px; }
        select, input { display: block; width: 100%; padding: 14px 16px; border: 1.5px solid var(--border-color); border-radius: 10px; font-size: 16px; font-family: 'Sarabun', sans-serif; background-color: #fafafa; }
        .btn-submit { display: block; width: 100%; padding: 16px; background-color: var(--primary-color); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: 600; font-family: 'Sarabun', sans-serif; cursor: pointer; box-shadow: 0 4px 12px rgba(46, 125, 50, 0.2); }
        .history-section { display: none; padding-top: 25px; } 
        .section-title { font-size: 17px; font-weight: 600; color: #333; margin-bottom: 18px; border-left: 4px solid var(--primary-color); padding-left: 10px; }
        #cards-container { display: flex; flex-direction: column; gap: 14px; }
        .log-card { border: 1px solid #edf2f0; background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .log-header { display: flex; justify-content: space-between; font-size: 12px; color: #757575; margin-bottom: 12px; border-bottom: 1px dashed #eee; padding-bottom: 8px; }
        .log-no { background-color: #f0f4f1; color: var(--primary-color); font-weight: 600; padding: 3px 8px; border-radius: 6px; }
        .log-body { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .log-name { font-size: 15px; font-weight: 600; }
        .log-sugar-val { font-size: 22px; font-weight: 600; color: var(--primary-color); }
        .log-footer { display: flex; gap: 10px; }
        .btn-action { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; font-family: 'Sarabun', sans-serif; cursor: pointer; }
        .btn-edit { background-color: #fff3e0; color: var(--edit-color); }
        .btn-delete { background-color: #ffebee; color: var(--delete-color); }
        #table-loading { text-align: center; color: #888; padding: 20px 0; }
    </style>
</head>
<body>
    <div class="nav-bar-fixed">
        <button class="btn-back" onclick="goBackMain()">⬅ ย้อนกลับ</button>
    </div>

    <div class="container">
        <div class="form-card">
            <div class="header">
                <h2>บันทึกค่าน้ำตาลสะสม</h2>
                <p>ระบบติดตามข้อมูลผู้ป่วยเบาหวาน</p>
            </div>

            <form id="bloodSugarForm">
                <div class="form-group">
                    <label for="userSelect">ผู้เข้าร่วมโครงการ</label>
                    <select id="userSelect" required>
                        <option value="" disabled selected>กำลังโหลดรายชื่อ...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="customDate">วัน-เวลาที่ตรวจ <span style="font-weight: normal; color: #777; font-size: 11px;">(หากไม่ระบุ จะเป็นเวลาปัจจุบัน)</span></label>
                    <input type="datetime-local" id="customDate">
                </div>

                <div class="form-group">
                    <label for="bloodsugar">ค่าน้ำตาลสะสม(%)</label>
                    <input type="number" id="bloodsugar" placeholder="ระบุค่าน้ำตาล" required min="0.1" step="any" inputmode="decimal">
                </div>

                <button type="submit" class="btn-submit">บันทึกข้อมูล</button>
            </form>
        </div>

        <div class="history-section" id="historyCard">
            <h3 class="section-title">ประวัติการบันทึกค่าน้ำตาล</h3>
            <div id="table-loading">กำลังโหลดประวัติข้อมูล...</div>
            <div id="cards-container"></div>
        </div>
    </div>

    <script>
        // เปลี่ยนเป็น URL Apps Script ของคุณ
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwLuqh2ivMXanbpRRbFfhMeOElAFgyrWBkFOthPZzCTjiI0gWdy7rDXTiuYlpj2Lzyb/exec'; 

        document.addEventListener('DOMContentLoaded', () => {
            if (typeof liff !== 'undefined') {
                liff.init({ liffId: "2009966517-lR3UbezH" })
                .then(() => { loadUsers(); })
                .catch(err => { console.error(err); loadUsers(); });
            } else {
                loadUsers();
            }
        });

        document.getElementById('userSelect').addEventListener('change', function() {
            loadHistoryCards(this.value);
        });

        // 🟢 ดึงรายชื่อผู้ป่วย (ไม่มีค่า t กวนใจแล้ว)
        async function loadUsers() {
            const select = document.getElementById('userSelect');
            try {
                const response = await fetch(`${SCRIPT_URL}?type=getUsers`);
                const users = await response.json();
                select.innerHTML = '<option value="" disabled selected>-- กรุณาเลือกชื่อผู้ป่วย --</option>';
                
                users.forEach(user => {
                    const option = document.createElement('option');
                    option.value = user.line_id;
                    option.textContent = user.line_name;
                    option.setAttribute('data-name', user.line_name);
                    select.appendChild(option);
                });
            } catch (error) {
                select.innerHTML = '<option value="" disabled selected>เกิดข้อผิดพลาดในการโหลดรายชื่อ</option>';
            }
        }

        // 🟢 ดึงประวัติค่าน้ำตาล
        async function loadHistoryCards(lineId) {
            const section = document.getElementById('historyCard');
            const loading = document.getElementById('table-loading');
            const container = document.getElementById('cards-container');
            
            section.style.display = 'block';
            loading.style.display = 'block';
            container.innerHTML = '';

            try {
                const response = await fetch(`${SCRIPT_URL}?type=getHistoryTable&line_id=${lineId}`);
                const data = await response.json();
                loading.style.display = 'none';

                if (!Array.isArray(data) || data.length === 0) {
                    container.innerHTML = '<div style="text-align:center; color:#999; padding:25px 0;">ไม่พบประวัติการบันทึก</div>';
                    return;
                }

                data.sort((a, b) => b.isoDate.localeCompare(a.isoDate));
                data.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'log-card';
                    card.innerHTML = `
                        <div class="log-header">
                            <span class="log-no">รายการที่ ${data.length - index}</span>
                            <span>${item.dateTime} น.</span>
                        </div>
                        <div class="log-body">
                            <div class="log-name">${item.name}</div>
                            <div><span class="log-sugar-val">${item.bloodsugar}</span> <span style="font-size:12px; color:#888;">%</span></div>
                        </div>
                        <div class="log-footer">
                            <button class="btn-action btn-edit" onclick="openEditModal(${item.row}, '${item.isoDate}', ${item.bloodsugar}, '${item.name}')">✏️ แก้ไข</button>
                            <button class="btn-action btn-delete" onclick="openDeleteModal(${item.row}, '${item.name}', ${item.bloodsugar})">🗑️ ลบ</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                loading.innerHTML = '<span style="color:red;">ไม่สามารถโหลดข้อมูลประวัติได้</span>';
            }
        }

        // 🟢 เพิ่มข้อมูลใหม่
        document.getElementById('bloodSugarForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const select = document.getElementById('userSelect');
            const selectedOption = select.options[select.selectedIndex];
            const lineId = selectedOption.value;
            const lineName = selectedOption.getAttribute('data-name');
            const bloodsugarValue = document.getElementById('bloodsugar').value;
            const customDateValue = document.getElementById('customDate').value; 

            Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

            let formData = new URLSearchParams();
            formData.append('action', 'insert'); 
            formData.append('line_id', lineId);
            formData.append('line_name', lineName);
            formData.append('bloodsugar', bloodsugarValue);
            formData.append('custom_date', customDateValue); 

            try {
                const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
                const result = await response.json();

                if (result.status === 'success') {
                    Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ', confirmButtonColor: '#2e7d32' });
                    document.getElementById('bloodsugar').value = '';
                    document.getElementById('customDate').value = ''; 
                    loadHistoryCards(lineId); 
                } else { throw new Error(result.message); }
            } catch (error) {
                Swal.fire({ icon: 'error', title: 'ล้มเหลว', text: error.message });
            }
        });

        // 🟢 แก้ไขข้อมูล
        async function openEditModal(row, isoDate, currentSugar, name) {
            const lineId = document.getElementById('userSelect').value;
            const { value: formValues } = await Swal.fire({
                title: 'แก้ไขข้อมูล',
                html: `
                    <input id="swal-date" type="datetime-local" class="swal2-input" value="${isoDate}">
                    <input id="swal-sugar" type="number" step="any" class="swal2-input" value="${currentSugar}">
                `,
                showCancelButton: true,
                confirmButtonText: 'บันทึก',
                preConfirm: () => {
                    return { newDate: document.getElementById('swal-date').value, newSugar: document.getElementById('swal-sugar').value }
                }
            });

            if (formValues) {
                let formData = new URLSearchParams();
                formData.append('action', 'update');
                formData.append('row', row);
                formData.append('line_id', lineId);
                formData.append('new_date', formValues.newDate);
                formData.append('new_bloodsugar', formValues.newSugar);

                try {
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
                    const result = await response.json();
                    if(result.status === 'success') {
                        Swal.fire('สำเร็จ', 'แก้ไขเรียบร้อย', 'success');
                        loadHistoryCards(lineId);
                    }
                } catch (error) { Swal.fire('ล้มเหลว', 'เกิดข้อผิดพลาด', 'error'); }
            }
        }

        // 🟢 ลบข้อมูล
        function openDeleteModal(row, name, sugar) {
            const lineId = document.getElementById('userSelect').value;
            Swal.fire({
                title: 'ยืนยันการลบ?',
                text: `ลบรายการ ${sugar}% ของคุณ ${name}`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d32f2f',
                confirmButtonText: 'ลบเลย'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    let formData = new URLSearchParams();
                    formData.append('action', 'delete');
                    formData.append('row', row);
                    formData.append('line_id', lineId);

                    try {
                        const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
                        const result = await response.json();
                        if(result.status === 'success') {
                            Swal.fire('ลบสำเร็จ!', 'ลบข้อมูลเรียบร้อย', 'success');
                            loadHistoryCards(lineId);
                        }
                    } catch (error) { Swal.fire('ผิดพลาด', 'ลบไม่ได้', 'error'); }
                }
            });
        }

        function goBackMain() {
            window.location.href = 'https://liff.line.me/2009966517-lR3UbezH';
        }
        
    </script>
</body>
</html>
