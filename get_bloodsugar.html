<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>บันทึกค่าน้ำตาลสะสม</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* บังคับคำนวณขนาดกล่องรวม Border และ Padding ทั้งหน้าเว็บ */
        * {
            box-sizing: border-box !important;
        }

        :root {
            --primary-color: #2e7d32; 
            --primary-hover: #1b5e20;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --border-color: #e0e0e0;
            --edit-color: #f57c00;
            --delete-color: #d32f2f;
        }
        body {
            font-family: 'Sarabun', sans-serif; background-color: var(--bg-color);
            margin: 0; display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; padding: 20px 15px;
        }

        /* ปุ่มกลับหน้าหลักแบบ Fixed (ลอยค้าง) */
        .nav-bar-fixed {
            position: fixed !important;
            top: 15px !important;
            left: 15px !important;
            z-index: 99999 !important;
        }

        .btn-back {
            padding: 10px 22px;
            background-color: rgba(255, 255, 255, 0.8);
            color: #555;
            border: 1px solid #ddd;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Sarabun', sans-serif;
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background-color: white;
            transform: scale(1.05);
        }
        
        .container {
            width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 20px;
        }
        
        .form-card, .history-section {
            background-color: var(--card-bg); width: 100%;
            padding: 30px 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { margin: 0; color: var(--primary-color); font-weight: 600; font-size: 22px; }
        .header p { margin: 5px 0 0; color: #666; font-size: 13px; }
        
        .form-group { margin-bottom: 20px; width: 100%; }
        label { display: block; margin-bottom: 8px; color: var(--text-main); font-weight: 600; font-size: 15px; }
        
        select, input[type="number"], input[type="datetime-local"] {
            display: block; width: 100%; max-width: 100%; min-width: 0;
            padding: 14px 16px; border: 1.5px solid var(--border-color);
            border-radius: 10px; font-size: 16px; font-family: 'Sarabun', sans-serif;
            background-color: #fafafa; transition: all 0.3s ease; color: #333;
            /* 🌟 ปลดล็อคการควบคุมสไตล์ของ iOS */
            -webkit-appearance: none !important;
            appearance: none !important;
        }
        
        select:focus, input[type="number"]:focus, input[type="datetime-local"]:focus {
            outline: none; border-color: var(--primary-color); background-color: #fff;
            box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.1);
        }
        
        .btn-submit {
            display: block; width: 100%; padding: 16px; background-color: var(--primary-color); color: white;
            border: none; border-radius: 10px; font-size: 18px; font-weight: 600;
            font-family: 'Sarabun', sans-serif; cursor: pointer;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.2); transition: all 0.3s ease;
        }
        
        .btn-submit:hover { background-color: var(--primary-hover); }
        
        .history-section { display: none; padding-top: 25px; } 
        
        .section-title {
            font-size: 17px; font-weight: 600; color: #333; margin-top: 0; margin-bottom: 18px;
            border-left: 4px solid var(--primary-color); padding-left: 10px;
        }
        #cards-container { display: flex; flex-direction: column; gap: 14px; }
        
        .log-card {
            border: 1px solid #edf2f0; background: #fff; border-radius: 12px;
            padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: transform 0.2s; position: relative;
        }
        .log-card:active { transform: scale(0.99); }
        
        .log-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px dashed #eee;
        }
        .log-no {
            background-color: #f0f4f1; color: var(--primary-color);
            font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 6px;
        }
        .log-time { font-size: 12px; color: #757575; font-weight: 400; }
        
        .log-body {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
        }
        .log-name { font-size: 15px; font-weight: 600; color: #2c3e50; }
        .log-sugar-wrapper { text-align: right; }
        .log-sugar-val { font-size: 22px; font-weight: 600; color: var(--primary-color); line-height: 1; }
        .log-sugar-unit { font-size: 11px; color: #888; display: block; margin-top: 2px; }
        
        .log-footer { display: flex; gap: 10px; }
        .btn-action {
            flex: 1; padding: 10px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: 600; font-family: 'Sarabun', sans-serif;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            gap: 6px; transition: all 0.2s;
        }
        .btn-edit { background-color: #fff3e0; color: var(--edit-color); border: 1px solid #ffe0b2; }
        .btn-edit:hover { background-color: var(--edit-color); color: #fff; }
        
        .btn-delete { background-color: #ffebee; color: var(--delete-color); border: 1px solid #ffcdd2; }
        .btn-delete:hover { background-color: var(--delete-color); color: #fff; }
        
        #table-loading { text-align: center; color: #888; padding: 20px 0; font-size: 14px; }

        /* 🌟 [โซนปรับแต่งเพื่อฆ่าบั๊ก Auto-Zoom ของ iPhone] 🌟 */
        @media (max-width: 440px) {
            body {
                padding: 12px 6px;
            }
            .form-card, .history-section {
                padding: 22px 12px; 
            }
            /* บังคับฟอนต์ห้ามต่ำกว่า 16px เพื่อไม่ให้ iOS แอบซูมหน้าจอตอนกดจิ้ม */
            select, input[type="number"], input[type="datetime-local"] {
                padding: 12px 10px;
                font-size: 16px !important; 
            }
            /* บีบเฉพาะระยะ Padding ด้านในช่องวันเวลา เพื่อให้แสดงผลในกล่องได้สวยงามไม่ล้น */
            input[type="datetime-local"] {
                padding-left: 6px !important;
                padding-right: 6px !important;
                letter-spacing: -0.3px !important;
            }
            label {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="nav-bar-fixed">
        <button class="btn-back" onclick="goBackMain()">
            ⬅ ย้อนกลับ
        </button>
    </div>

    <div class="container">
        <div class="form-card">
            <div class="header">
                <br><br>
                <h2>บันทึกค่าน้ำตาลสะสม</h2>
                <p>ระบบติดตามข้อมูลผู้ป่วยเบาหวาน</p>
            </div>

            <form id="bloodSugarForm">
                <div class="form-group">
                    <label for="userSelect">ชื่อ-นามสกุล ผู้เข้าร่วมโครงการ</label>
                    <select id="userSelect" required>
                        <option value="" disabled selected>กำลังโหลดรายชื่อ...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="customDate">วัน-เวลาที่ตรวจ <span style="font-weight: normal; color: #777; font-size: 11px;">(หากไม่ระบุ จะเป็นเวลาปัจจุบัน)</span></label>
                    <input type="datetime-local" id="customDate">
                </div>

                <div class="form-group">
                    <label for="bloodsugar">ค่าน้ำตาลสะสม(%)</label>
                    <input type="number" id="bloodsugar" placeholder="ระบุค่าน้ำตาล" required min="0.1" step="any" inputmode="decimal">
                </div>

                <button type="submit" class="btn-submit">บันทึกข้อมูล</button>
            </form>
        </div>

        <div class="history-section" id="historyCard">
            <h3 class="section-title">ประวัติการบันทึกค่าน้ำตาล</h3>
            <div id="table-loading">กำลังโหลดประวัติข้อมูล...</div>
            <div id="cards-container">
                </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwLuqh2ivMXanbpRRbFfhMeOElAFgyrWBkFOthPZzCTjiI0gWdy7rDXTiuYlpj2Lzyb/exec'; 

        document.addEventListener('DOMContentLoaded', loadUsers);
        document.getElementById('userSelect').addEventListener('change', function() {
            loadHistoryCards(this.value);
        });

        async function loadUsers() {
            const select = document.getElementById('userSelect');
            try {
                const response = await fetch(SCRIPT_URL + '?type=getUsers');
                const users = await response.json();
                select.innerHTML = '<option value="" disabled selected>-- กรุณาเลือกชื่อผู้ป่วย --</option>';
                
                if(users.error) {
                    select.innerHTML = `<option value="" disabled selected>${users.error}</option>`;
                    return;
                }

                users.forEach(user => {
                    const option = document.createElement('option');
                    option.value = user.line_id;
                    option.textContent = user.line_name;
                    option.setAttribute('data-name', user.line_name);
                    select.appendChild(option);
                });
            } catch (error) {
                console.error("Error:", error);
                select.innerHTML = '<option value="" disabled selected>เกิดข้อผิดพลาดในการโหลดรายชื่อ</option>';
            }
        }

        async function loadHistoryCards(lineId) {
            const section = document.getElementById('historyCard');
            const loading = document.getElementById('table-loading');
            const container = document.getElementById('cards-container');
            
            section.style.display = 'block';
            loading.style.display = 'block';
            container.innerHTML = '';

            try {
                const response = await fetch(`${SCRIPT_URL}?type=getHistoryTable&line_id=${lineId}`);
                const data = await response.json();
                loading.style.display = 'none';

                if (!Array.isArray(data) || data.length === 0) {
                    container.innerHTML = '<div style="text-align:center; color:#999; padding:25px 0; font-size:14px;">ไม่พบประวัติการบันทึกข้อมูลของผู้ป่วยรายนี้</div>';
                    return;
                }

                data.sort((a, b) => a.isoDate.localeCompare(b.isoDate));

                data.forEach((item, index) => {
                    const card = document.createElement('div');
                    card.className = 'log-card';
                    card.innerHTML = `
                        <div class="log-header">
                            <span class="log-no">รายการที่ ${index + 1}</span>
                            <span class="log-time">${item.dateTime} น.</span>
                        </div>
                        <div class="log-body">
                            <div class="log-name">${item.name}</div>
                            <div class="log-sugar-wrapper">
                                <span class="log-sugar-val">${item.bloodsugar}</span>
                                <span class="log-sugar-unit">mg/dL</span>
                            </div>
                        </div>
                        <div class="log-footer">
                            <button class="btn-action btn-edit" onclick="openEditModal(${item.row}, '${item.isoDate}', ${item.bloodsugar}, '${item.name}')">
                                ✏️ แก้ไข
                            </button>
                            <button class="btn-action btn-delete" onclick="openDeleteModal(${item.row}, '${item.name}', ${item.bloodsugar})">
                                🗑️ ลบ
                            </button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error(error);
                loading.innerHTML = '<span style="color:red; font-size:14px;">ไม่สามารถโหลดข้อมูลประวัติได้</span>';
            }
        }

        async function openEditModal(row, isoDate, currentSugar, name) {
            const lineId = document.getElementById('userSelect').value;

            const { value: formValues } = await Swal.fire({
                title: 'แก้ไขข้อมูลบันทึก',
                text: `คุณ ${name}`,
                html: `
                    <div style="text-align: left; margin-bottom: 6px;"><label style="font-weight:600; font-size:14px; color:#555;">วัน-เวลาตรวจย้อนหลัง:</label></div>
                    <input id="swal-date" type="datetime-local" class="swal2-input" style="margin: 0 0 15px 0; width: 90%; padding: 10px 6px; font-family: 'Sarabun'; font-size: 16px !important; -webkit-appearance:none;" value="${isoDate}">
                    <div style="text-align: left; margin-bottom: 6px;"><label style="font-weight:600; font-size:14px; color:#555;">ค่าน้ำตาลสะสม(%):</label></div>
                    <input id="swal-sugar" type="number" inputmode="decimal" step="any" class="swal2-input" style="margin: 0; width: 90%; font-family: 'Sarabun'; font-size: 16px !important;" value="${currentSugar}">
                `,
                focusConfirm: false,
                showCancelButton: true,
                confirmButtonText: 'บันทึกการแก้ไข',
                cancelButtonText: 'ยกเลิก',
                confirmButtonColor: '#2e7d32',
                preConfirm: () => {
                    return {
                        newDate: document.getElementById('swal-date').value,
                        newSugar: document.getElementById('swal-sugar').value
                    }
                }
            });

            if (formValues) {
                if(!formValues.newDate || !formValues.newSugar) {
                    Swal.fire('แจ้งเตือน', 'กรุณากรอกข้อมูลให้ครบถ้วน', 'warning');
                    return;
                }

                Swal.fire({ title: 'กำลังปรับปรุงข้อมูล...', didOpen: () => { Swal.showLoading(); } });

                let formData = new URLSearchParams();
                formData.append('action', 'update');
                formData.append('row', row);
                formData.append('line_id', lineId);
                formData.append('new_date', formValues.newDate);
                formData.append('new_bloodsugar', formValues.newSugar);

                try {
                    const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
                    const result = await response.json();
                    if(result.status === 'success') {
                        Swal.fire('สำเร็จ!', 'แก้ไขข้อมูลเรียบร้อยแล้ว', 'success');
                        loadHistoryCards(lineId);
                    } else {
                        throw new Error(result.message);
                    }
                } catch (error) {
                    Swal.fire('ล้มเหลว', 'ไม่สามารถแก้ไขข้อมูลได้: ' + error.message, 'error');
                }
            }
        }

        function openDeleteModal(row, name, sugar) {
            const lineId = document.getElementById('userSelect').value;

            Swal.fire({
                title: 'ยืนยันการลบข้อมูล?',
                text: `คุณกำลังจะลบรายการค่าน้ำตาล ${sugar} mg/dL ของคุณ ${name} ออกจากระบบอย่างถาวร!`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d32f2f',
                cancelButtonColor: '#666',
                confirmButtonText: 'ใช่, ฉันต้องการลบ',
                cancelButtonText: 'ยกเลิก'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.fire({ title: 'กำลังลบข้อมูล...', didOpen: () => { Swal.showLoading(); } });

                    let formData = new URLSearchParams();
                    formData.append('action', 'delete');
                    formData.append('row', row);
                    formData.append('line_id', lineId);

                    try {
                        const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
                        const result = await response.json();
                        if(result.status === 'success') {
                            Swal.fire('ลบสำเร็จ!', 'ลบรายการข้อมูลเรียบร้อยแล้ว', 'success');
                            loadHistoryCards(lineId);
                        } else {
                            throw new Error(result.message);
                        }
                    } catch (error) {
                        Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถลบข้อมูลได้: ' + error.message, 'error');
                    }
                }
            });
        }

        document.getElementById('bloodSugarForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const select = document.getElementById('userSelect');
            const selectedOption = select.options[select.selectedIndex];
            const lineId = selectedOption.value;
            const lineName = selectedOption.getAttribute('data-name');
            const bloodsugarValue = document.getElementById('bloodsugar').value;
            const customDateValue = document.getElementById('customDate').value; 

            Swal.fire({ title: 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

            let formData = new URLSearchParams();
            formData.append('line_id', lineId);
            formData.append('line_name', lineName);
            formData.append('bloodsugar', bloodsugarValue);
            formData.append('custom_date', customDateValue); 

            try {
                const response = await fetch(SCRIPT_URL, { method: 'POST', body: formData });
                const result = await response.json();

                if (result.status === 'success') {
                    await Swal.fire({
                        icon: 'success',
                        title: 'บันทึกสำเร็จ',
                        text: `บันทึกค่าน้ำตาล ${bloodsugarValue} mg/dL ของคุณ ${lineName} เรียบร้อยแล้ว`,
                        confirmButtonColor: '#2e7d32'
                    });
                    
                    document.getElementById('bloodsugar').value = '';
                    document.getElementById('customDate').value = ''; 
                    
                    loadHistoryCards(lineId); 
                } else {
                    throw new Error(result.message || 'Server error');
                }
            } catch (error) {
                console.error(error);
                Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: 'ไม่สามารถบันทึกข้อมูลได้', confirmButtonColor: '#d33' });
            }
        });

        function goBackMain() {
            var baseUrl = 'https://nanlaphaslineoadiabetes19-sketch.github.io/diabetes';
            window.location.href = baseUrl + '/get_bloodsugar.html';
        }
    </script>
</body>
</html>
