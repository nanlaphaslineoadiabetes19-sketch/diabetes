<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>นับคาร์บ & วางแผนอาหาร</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Kanit:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-orange: #e67e22;
            --primary-green: #27ae60;
            --bg-cream: #fffaf0;
            --text-dark: #2c3e50;
            --card-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        body { margin: 0; padding: 0; background-color: #f4f7f6; font-family: 'Sarabun', sans-serif; color: var(--text-dark); min-height: 100vh; }
        .nav-bar { position: fixed; top: 15px; left: 15px; z-index: 9999; }
        .btn-back { padding: 10px 22px; background-color: rgba(255, 255, 255, 0.9); color: #444; border: 1px solid rgba(0,0,0,0.05); border-radius: 50px; cursor: pointer; font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); backdrop-filter: blur(10px); transition: 0.3s; text-decoration: none; }
        .container-main { width: 100%; max-width: 550px; margin: 0 auto; background: white; min-height: 100vh; box-shadow: var(--card-shadow); display: flex; flex-direction: column; }
        .hero-banner { background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%); color: white; text-align: center; padding: 40px 20px; border-radius: 0 0 40px 40px; }
        .hero-banner h1 { font-family: 'Kanit', sans-serif; font-weight: 600; font-size: 1.8rem; margin: 0; }
        .form-section { padding: 30px 25px; }
        .section-header h2 { font-family: 'Kanit', sans-serif; font-size: 1.2rem; color: var(--primary-orange); font-weight: 600; text-align: center; margin-bottom: 20px; }
        .glass-input { border: 2px solid #f0f0f0; border-radius: 12px; padding: 12px; font-size: 1.1rem; font-weight: 600; text-align: center; transition: 0.3s; color: var(--primary-green); }
        .form-label { font-weight: 700; font-size: 0.85rem; color: #555; margin-bottom: 5px; display: block; }
        .gender-selector { display: flex; gap: 10px; align-items: center; }
        .gender-box { flex: 1; border: 2px solid #eee; border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; transition: 0.3s; background: #fff; }
        .gender-box.active { border-color: var(--primary-orange); background: #fff5e6; color: var(--primary-orange); font-weight: 700; }
        input[type="radio"] { display: none; }
        .btn-calculate { background: var(--primary-orange); color: white; border: none; border-radius: 15px; padding: 18px; font-weight: 700; width: 100%; font-size: 1.2rem; margin-top: 25px; box-shadow: 0 8px 20px rgba(230, 126, 34, 0.3); transition: 0.3s; font-family: 'Kanit', sans-serif; }
        
        .result-section { background: var(--bg-cream); border-radius: 20px; padding: 25px; margin-top: 30px; border: 2px dashed var(--primary-green); display: none; }
        .res-card { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .res-data { font-weight: 700; color: var(--primary-green); }
        .highlight-res { color: var(--primary-orange); font-size: 1.4rem; font-weight: 700; }

        .planning-section { margin-top: 40px; border-top: 2px solid #eee; padding-top: 30px; display: none; }
        .planning-title { font-family: 'Kanit', sans-serif; font-size: 1.4rem; text-align: center; color: var(--text-dark); margin-bottom: 10px; }
        .carb-remaining-box { background: #fff; border: 2px solid var(--primary-orange); border-radius: 15px; padding: 15px; text-align: center; margin-bottom: 25px; }
        
        .meal-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .meal-table th { background: #f8f9fa; padding: 10px; border: 1px solid #dee2e6; text-align: center; }
        .meal-table td { padding: 8px; border: 1px solid #dee2e6; vertical-align: middle; }
        .meal-select { width: 100%; border: 1px solid #ccc; border-radius: 5px; padding: 5px; font-size: 0.8rem; margin-bottom: 5px; }
        .carb-display { font-weight: bold; color: var(--primary-orange); display: block; text-align: center; }
        .over-limit { color: #e74c3c !important; }

        footer { padding: 40px 20px; text-align: center; margin-top: auto; }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="food.html" class="btn-back"><span>⬅</span> ย้อนกลับ</a>
    </nav>

    <div class="container-main">
        <div class="hero-banner"><br>
            <h1>นับคาร์บ & วางแผนอาหาร</h1>
        </div>

        <div class="form-section">
            <div class="section-header">
                <h2>ใส่ข้อมูลเพื่อคำนวณคาร์บที่เหมาะสม</h2>
            </div>
            
            <form id="healthForm">
                <div class="d-flex align-items-center gap-3 mb-3">
                    <span class="form-label mb-0">เพศ</span>
                    <div class="gender-selector mb-0 flex-grow-1">
                        <label class="gender-box active" id="label-m"><input type="radio" name="gender" value="male" checked onchange="updateGenderUI()"> ชาย</label>
                        <label class="gender-box" id="label-f"><input type="radio" name="gender" value="female" onchange="updateGenderUI()"> หญิง</label>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-6"><label class="form-label">น้ำหนัก (กก.)</label><input type="number" id="weight" class="form-control glass-input" placeholder="0" step="0.1" required></div>
                    <div class="col-6"><label class="form-label">ส่วนสูง (ซม.)</label><input type="number" id="height" class="form-control glass-input" placeholder="0" required></div>
                    <div class="col-6"><label class="form-label">อายุ (ปี)</label><input type="number" id="age" class="form-control glass-input" placeholder="0" required></div>
                    <div class="col-6">
                        <label class="form-label">ระดับกิจกรรม</label>
                        <select class="form-select glass-input" id="activity" style="font-size: 0.8rem; height: 55px;">
                            <option value="1.2">น้อยมาก (นั่งทำงาน)</option>
                            <option value="1.375">1-3 วัน/สัปดาห์</option>
                            <option value="1.55">4-5 วัน/สัปดาห์</option>
                            <option value="1.725">หนัก (6-7 วัน)</option>
                        </select>
                    </div>
                </div>
                <button type="button" onclick="calculateCarbs()" class="btn-calculate">คำนวณ</button>
            </form>

            <div id="results" class="result-section">
                <h5 class="text-center fw-bold mb-3" style="color: var(--primary-green);">แนะนำให้กิน:</h5>
                <div class="res-card"><span class="res-title">BMI:</span><span class="res-data" id="r-bmi">-</span></div>
                <div class="res-card border-0"><span class="res-title fw-bold">ปริมาณคาร์บที่แนะนำต่อวัน:</span><span class="highlight-res"><span id="r-carb-u">0</span> คาร์บ</span></div>
            </div>

            <div id="planning" class="planning-section">
                <h2 class="planning-title">วางแผนการรับประทานอาหาร</h2>
                <div class="carb-remaining-box">
                    <span style="font-size: 0.9rem; color: #666;">คาร์บที่แนะนำต่อวัน: <strong id="plan-target">0</strong> คาร์บ</span><br>
                    <span style="font-size: 1.2rem; font-weight: bold;">คงเหลือ: <span id="plan-rem">0</span> คาร์บ</span>
                </div>

                <table class="meal-table">
                    <thead>
                        <tr>
                            <th width="15%">มื้อ</th>
                            <th width="35%">อาหารหลัก</th>
                            <th width="35%">ว่าง/เครื่องดื่ม</th>
                            <th width="15%">คาร์บ</th>
                        </tr>
                    </thead>
                    <tbody id="meal-body">
                        <tr>
                            <td class="text-center fw-bold">เช้า</td>
                            <td><select class="meal-select" onchange="updatePlanning()" id="m1_main"><option value="0">โหลดข้อมูล...</option></select></td>
                            <td><select class="meal-select" onchange="updatePlanning()" id="m1_snack"><option value="0">โหลดข้อมูล...</option></select></td>
                            <td><span class="carb-display" id="m1_total">0</span></td>
                        </tr>
                        <tr>
                            <td class="text-center fw-bold">กลางวัน</td>
                            <td><select class="meal-select" onchange="updatePlanning()" id="m2_main"><option value="0">โหลดข้อมูล...</option></select></td>
                            <td><select class="meal-select" onchange="updatePlanning()" id="m2_snack"><option value="0">โหลดข้อมูล...</option></select></td>
                            <td><span class="carb-display" id="m2_total">0</span></td>
                        </tr>
                        <tr>
                            <td class="text-center fw-bold">เย็น</td>
                            <td><select class="meal-select" onchange="updatePlanning()" id="m3_main"><option value="0">โหลดข้อมูล...</option></select></td>
                            <td><select class="meal-select" onchange="updatePlanning()" id="m3_snack"><option value="0">โหลดข้อมูล...</option></select></td>
                            <td><span class="carb-display" id="m3_total">0</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <footer><p class="copyright">© 2026 ระบบดูแลเบาหวานด้วยตนเอง</p></footer>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const scriptURL = 'ใส่_WEB_APP_URL_ของคุณที่นี่'; // *** อย่าลืมเปลี่ยนเป็น URL ของ Apps Script ***
        let currentTargetCarb = 0;
        let foodData = { "อาหารหลัก": [], "อาหารว่าง": [], "เครื่องดื่ม": [] };

        // 1. ดึงข้อมูลจาก Google Sheet เมื่อโหลดหน้าเว็บ
        async function fetchFoodData() {
            try {
                const response = await fetch(scriptURL);
                foodData = await response.json();
                populateDropdowns();
            } catch (error) {
                console.error("Error fetching food data:", error);
                alert("ไม่สามารถโหลดข้อมูลอาหารได้ กรุณาเช็คการเชื่อมต่อ");
            }
        }

        function populateDropdowns() {
            const meals = ['m1', 'm2', 'm3'];
            meals.forEach(m => {
                const mainSelect = document.getElementById(`${m}_main`);
                const snackSelect = document.getElementById(`${m}_snack`);
                
                mainSelect.innerHTML = '<option value="0">-- เลือกอาหาร --</option>';
                snackSelect.innerHTML = '<option value="0">-- เลือกว่าง/เครื่องดื่ม --</option>';

                // ใส่ข้อมูลอาหารหลัก
                foodData["อาหารหลัก"].forEach(item => {
                    mainSelect.options.add(new Option(`${item.n} (${item.c})`, item.c));
                });
                
                // รวมอาหารว่างและเครื่องดื่มไว้ในช่องเดียวกัน
                const snacks = [...foodData["อาหารว่าง"], ...foodData["เครื่องดื่ม"]];
                snacks.forEach(item => {
                    snackSelect.options.add(new Option(`${item.n} (${item.c})`, item.c));
                });
            });
        }

        // 2. คำนวณ BMI และ Carb
        async function calculateCarbs() {
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const age = parseInt(document.getElementById('age').value);
            const gender = document.querySelector('input[name="gender"]:checked').value;
            const activity = parseFloat(document.getElementById('activity').value);

            if (!weight || !height || !age) return alert("กรุณากรอกข้อมูลให้ครบ");

            const bmi = (weight / Math.pow(height / 100, 2)).toFixed(1);
            let bmr = (gender === 'male') ? 66 + (13.7 * weight) + (5 * height) - (6.8 * age) : 665 + (9.6 * weight) + (1.8 * height) - (4.7 * age);
            const tdee = Math.round(bmr * activity);
            const carbUnits = ((tdee * 0.2 / 4) / 15).toFixed(1);

            currentTargetCarb = parseFloat(carbUnits);
            document.getElementById('results').style.display = 'block';
            document.getElementById('planning').style.display = 'block';
            document.getElementById('r-bmi').innerText = bmi;
            document.getElementById('r-carb-u').innerText = carbUnits;
            document.getElementById('plan-target').innerText = carbUnits;
            
            updatePlanning(); 
            
            // ส่งบันทึกข้อมูลเดิม (ถ้ามี LIFF ID)
            saveToSheet(bmi, tdee, carbUnits);
        }

        // 3. หักลบคาร์บในตาราง
        function updatePlanning() {
            let totalConsumed = 0;
            const meals = ['m1', 'm2', 'm3'];

            meals.forEach(m => {
                const mainVal = parseFloat(document.getElementById(`${m}_main`).value) || 0;
                const snackVal = parseFloat(document.getElementById(`${m}_snack`).value) || 0;
                const sum = mainVal + snackVal;
                document.getElementById(`${m}_total`).innerText = sum.toFixed(2);
                totalConsumed += sum;
            });

            const remaining = currentTargetCarb - totalConsumed;
            const remEl = document.getElementById('plan-rem');
            remEl.innerText = remaining.toFixed(2);
            remEl.classList.toggle('over-limit', remaining < 0);
        }

        function updateGenderUI() {
            document.getElementById('label-m').classList.toggle('active', document.querySelector('input[value="male"]').checked);
            document.getElementById('label-f').classList.toggle('active', document.querySelector('input[value="female"]').checked);
        }

        async function saveToSheet(bmi, tdee, carbs) {
            // ฟังก์ชันเดิมที่คุณใช้บันทึกข้อมูลลง Sheet
            console.log("บันทึกข้อมูล BMI เรียบร้อย");
        }

        window.onload = () => { fetchFoodData(); };
    </script>
</body>
</html>
