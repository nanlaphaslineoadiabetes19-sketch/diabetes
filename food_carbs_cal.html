<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คำนวณคาร์บ - นับคาร์บ ลดโรค NCDs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Kanit:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-orange: #e67e22;
            --primary-green: #27ae60;
            --bg-cream: #fffaf0;
            --text-dark: #2c3e50;
            --card-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            font-family: 'Sarabun', sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
        }

        .nav-bar {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 9999;
        }

        .btn-back {
            padding: 10px 22px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #444;
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 50px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            backdrop-filter: blur(10px);
            transition: 0.3s;
            text-decoration: none;
        }

        .container-main {
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
        }

        .hero-banner {
            background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
            color: white;
            text-align: center;
            padding: 45px 20px;
            border-radius: 0 0 40px 40px;
        }

        .hero-banner h1 { font-family: 'Kanit', sans-serif; font-weight: 600; font-size: 1.8rem; margin: 0; }

        .form-section { padding: 30px 25px; }

        /* ปรับปรุงช่องกรอกข้อมูลให้ตัวเลขใหญ่และชัดเจน */
        .glass-input {
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            padding: 15px;
            font-size: 1.25rem; /* ตัวเลขใหญ่ขึ้น */
            font-weight: 600;
            text-align: center; /* ตัวเลขอยู่ตรงกลาง */
            transition: 0.3s;
            color: var(--primary-green);
        }

        .glass-input:focus {
            border-color: var(--primary-green);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(39, 174, 96, 0.1);
        }

        .form-label { font-weight: 700; font-size: 0.9rem; color: #555; margin-bottom: 8px; display: block; }

        .gender-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .gender-box {
            flex: 1; border: 2px solid #eee; border-radius: 15px; padding: 12px;
            text-align: center; cursor: pointer; transition: 0.3s; background: #fff;
        }
        .gender-box.active { border-color: var(--primary-orange); background: #fff5e6; color: var(--primary-orange); font-weight: 700; }
        input[type="radio"] { display: none; }

        .btn-calculate {
            background: var(--primary-orange); color: white; border: none; border-radius: 15px;
            padding: 18px; font-weight: 700; width: 100%; font-size: 1.2rem; margin-top: 25px;
            box-shadow: 0 8px 20px rgba(230, 126, 34, 0.3); transition: 0.3s; font-family: 'Kanit', sans-serif;
        }

        .result-section {
            background: var(--bg-cream); border-radius: 25px; padding: 25px; margin-top: 35px;
            border: 2px dashed var(--primary-green); display: none;
        }

        footer { padding: 30px 20px; text-align: center; margin-top: auto; }
        .copyright { font-size: 12px; color: #bdc3c7; }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="food.html" class="btn-back"><span>⬅</span> กลับหน้าหลัก</a>
    </nav>

    <div class="container-main">
        <div class="hero-banner">
            <i class="bi bi-calculator" style="font-size: 2.5rem;"></i>
            <h1>นับคาร์บ ลดโรค NCDs</h1>
            <p>วางแผนการกินคาร์โบไฮเดรตให้พอดี</p>
        </div>

        <div class="form-section">
            <form id="healthForm">
                <div class="gender-selector">
                    <label class="gender-box active" id="label-m">
                        <input type="radio" name="gender" value="male" checked onchange="updateGenderUI()">
                        <i class="bi bi-gender-male"></i> ชาย
                    </label>
                    <label class="gender-box" id="label-f">
                        <input type="radio" name="gender" value="female" onchange="updateGenderUI()">
                        <i class="bi bi-gender-female"></i> หญิง
                    </label>
                </div>

                <div class="row g-3">
                    <div class="col-6">
                        <label class="form-label">น้ำหนัก (กก.)</label>
                        <input type="number" id="weight" class="form-control glass-input" placeholder="0.0" step="0.1" inputmode="decimal" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label">ส่วนสูง (ซม.)</label>
                        <input type="number" id="height" class="form-control glass-input" placeholder="0" inputmode="decimal" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label">อายุ (ปี)</label>
                        <input type="number" id="age" class="form-control glass-input" placeholder="0" inputmode="numeric" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label">รอบเอว (ซม.)</label>
                        <input type="number" id="waist" class="form-control glass-input" placeholder="0" inputmode="decimal">
                    </div>
                </div>

                <div class="mt-4">
                    <label class="form-label">ระดับกิจกรรมทางกาย</label>
                    <select class="form-select glass-input" id="activity" style="text-align: left; font-size: 1rem;">
                        <option value="1.2">ไม่ออกกำลังกาย</option>
                        <option value="1.375">เบาๆ (1-3 วัน/สัปดาห์)</option>
                        <option value="1.55">ปานกลาง (4-5 วัน/สัปดาห์)</option>
                        <option value="1.725">หนัก (6-7 วัน/สัปดาห์)</option>
                        <option value="1.9">หนักมาก / นักกีฬา</option>
                    </select>
                </div>

                <button type="button" onclick="calculateCarbs()" class="btn-calculate">คำนวณผล</button>
            </form>

            <div id="results" class="result-section">
                <h5 class="text-center fw-bold mb-3" style="color: var(--primary-green);">ผลการวิเคราะห์</h5>
                <div class="d-flex justify-content-between mb-2"><span>BMI:</span> <b id="r-bmi">-</b></div>
                <div class="d-flex justify-content-between mb-2"><span>TDEE:</span> <b id="r-tdee">-</b> kcal</div>
                <hr>
                <div class="text-center">
                    <span class="d-block mb-1">ปริมาณคาร์บที่แนะนำ</span>
                    <span style="font-size: 2rem; color: var(--primary-orange); font-weight: 700;"><span id="r-carb-u">-</span> คาร์บ/วัน</span>
                    <p class="small text-muted mt-2">หรือประมาณ <span id="r-carb-g">-</span> กรัมต่อวัน</p>
                </div>
            </div>
        </div>

        <footer>
            <p class="copyright">© 2026 ระบบดูแลสุขภาพด้วยตนเอง</p>
        </footer>
    </div>

    <script>
        function updateGenderUI() {
            const gender = document.querySelector('input[name="gender"]:checked').value;
            document.getElementById('label-m').classList.toggle('active', gender === 'male');
            document.getElementById('label-f').classList.toggle('active', gender === 'female');
        }

        function calculateCarbs() {
            const gender = document.querySelector('input[name="gender"]:checked').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const age = parseInt(document.getElementById('age').value);
            const activity = parseFloat(document.getElementById('activity').value);

            if (!weight || !height || !age) { alert("กรุณากรอกข้อมูลให้ครบครับ"); return; }

            const bmi = (weight / Math.pow(height / 100, 2)).toFixed(2);
            let bmr = (gender === 'male') 
                ? 66 + (13.7 * weight) + (5 * height) - (6.8 * age)
                : 665 + (9.6 * weight) + (1.8 * height) - (4.7 * age);
            
            const tdee = Math.round(bmr * activity);
            const carbGrams = ((tdee * 0.2) / 4).toFixed(1);
            const carbUnits = (carbGrams / 15).toFixed(1);

            document.getElementById('results').style.display = 'block';
            document.getElementById('r-bmi').innerText = bmi;
            document.getElementById('r-tdee').innerText = tdee.toLocaleString();
            document.getElementById('r-carb-g').innerText = carbGrams;
            document.getElementById('r-carb-u').innerText = carbUnits;
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
