<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กราฟแสดงระดับน้ำตาลในเลือดสะสม</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <style>
        :root {
            --primary-color: #ff5252;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; box-sizing: border-box;
        }

        .chart-container {
            background-color: var(--card-bg); width: 100%; max-width: 600px;
            padding: 30px 20px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); position: relative;
        }

        .header-title {
            text-align: center; color: var(--text-main);
            font-size: 22px; font-weight: 600; margin-bottom: 25px;
        }

        #loading {
            text-align: center; color: #666; padding: 50px 0; font-size: 18px; display: block;
        }

        #no-data {
            display: none; text-align: center; padding: 40px 15px;
        }

        #no-data svg {
            width: 80px; height: 80px; fill: #cccccc; margin-bottom: 15px;
        }

        #no-data h3 {
            color: var(--primary-color); margin: 0 0 10px 0; font-size: 20px; font-weight: 600;
        }

        #no-data p {
            color: #888888; margin: 0; font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="chart-container">
        <div class="header-title">ระดับน้ำตาลในเลือดสะสม</div>
        
        <div id="loading">กำลังประมวลผลข้อมูล...</div>
        
        <div id="no-data">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
            <h3>คุณยังไม่ได้รับการตรวจระดับน้ำตาลในเลือด</h3>
            <p>ข้อมูลจะแสดงผลเมื่อพยาบาลทำการบันทึกข้อมูลเข้าระบบเรียบร้อยแล้ว</p>
        </div>
        
        <canvas id="bloodSugarChart" style="display: none;"></canvas>
    </div>

    <script>
        // 🛑 นำ URL ใหม่จากข้อแรกมาอัปเดตตรงนี้ครับ
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwLuqh2ivMXanbpRRbFfhMeOElAFgyrWBkFOthPZzCTjiI0gWdy7rDXTiuYlpj2Lzyb/exec';
        const LIFF_ID = '2009966517-3xJurBfY'; 

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    fetchDataAndDrawChart(profile.userId); 
                } else {
                    liff.login(); 
                }
            } catch (err) {
                console.error('LIFF Init Error:', err);
                document.getElementById('loading').innerHTML = '<span style="color:red;">เกิดข้อผิดพลาดในการเชื่อมต่อระบบ LINE</span>';
            }
        }

        async function fetchDataAndDrawChart(lineId) {
            try {
                const response = await fetch(`${SCRIPT_URL}?type=getGraphData&line_id=${lineId}`);
                if (!response.ok) throw new Error("Network response was not ok");
                const data = await response.json();

                // ซ่อนตัวโหลดก่อนเป็นอันดับแรก
                document.getElementById('loading').style.display = 'none';

                // แก้ไขปัญหา: ตรวจจับกรณีฝั่งหลังบ้านส่ง Error กลับมาแทนอาร์เรย์
                if (data && data.error) {
                    document.getElementById('loading').innerHTML = `<span style="color:red;">เกิดข้อผิดพลาด: ${data.error}</span>`;
                    document.getElementById('loading').style.display = 'block';
                    return;
                }

                // ตรวจสอบความถูกต้องของอาเรย์ข้อมูล
                if (!Array.isArray(data) || data.length === 0) {
                    document.getElementById('no-data').style.display = 'block';
                    return;
                }

                // แมปค่าแกน X และ Y ออกมาใช้งาน
                const labels = data.map(item => item.date);
                const values = data.map(item => item.value);

                document.getElementById('bloodSugarChart').style.display = 'block';
                drawChart(labels, values);

            } catch (error) {
                console.error('Fetch Error:', error);
                document.getElementById('loading').innerHTML = '<span style="color:red;">ไม่สามารถดึงข้อมูลกราฟได้ในขณะนี้</span>';
                document.getElementById('loading').style.display = 'block';
            }
        }

        function drawChart(labels, values) {
            const ctx = document.getElementById('bloodSugarChart').getContext('2d');
            
            // ป้องกันกราฟเอเรอร์กรณีค่าสูงเกินไป
            const maxVal = values.length > 0 ? Math.max(...values) : 10;

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels, 
                    datasets: [{
                        label: 'ระดับน้ำตาล (%)',
                        data: values, 
                        borderColor: '#ff5252',
                        backgroundColor: 'rgba(255, 82, 82, 0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#ff5252',
                        pointBorderWidth: 2,
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        fill: true,
                        tension: 0.2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            titleFont: { family: 'Sarabun', size: 14 },
                            bodyFont: { family: 'Sarabun', size: 14 }
                        }
                    },
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: 'วันที่ตรวจ',
                                font: { family: 'Sarabun', size: 15, weight: 'bold' },
                                color: '#666'
                            },
                            grid: { display: false }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'ระดับน้ำตาลในเลือดสะสม (%)',
                                font: { family: 'Sarabun', size: 15, weight: 'bold' },
                                color: '#ff5252'
                            },
                            beginAtZero: true,
                            suggestedMax: maxVal + 2, 
                            grid: { borderDash: [4, 4] }
                        }
                    }
                }
            });
        }

        main();
    </script>
</body>
</html>
