<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กราฟแสดงระดับน้ำตาลในเลือดสะสม</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <style>
        :root {
            --primary-color: #ff5252;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 12px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .chart-container {
            background-color: var(--card-bg); width: 100%; max-width: 500px;
            padding: 24px 16px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06); position: relative;
        }

        .header-title {
            text-align: center; color: var(--text-main);
            font-size: 20px; font-weight: 600; margin-bottom: 20px;
        }

        .chart-unit-label {
            font-size: 13px;
            color: var(--text-sub);
            font-weight: 600;
            margin-bottom: 6px;
            padding-left: 4px;
            display: none; 
        }

        /* 🌟 ขยายความสูง Wrapper เป็น 370px เพื่อรองรับทั้งตัวหนังสือเอียง 80 องศา และ Label ด้านล่างสุด */
        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 370px; 
        }

        #loading {
            text-align: center; color: #666; padding: 50px 0; font-size: 16px; display: block;
        }

        #no-data {
            display: none; text-align: center; padding: 40px 15px;
        }

        #no-data svg {
            width: 70px; height: 70px; fill: #cccccc; margin-bottom: 15px;
        }

        #no-data h3 {
            color: var(--primary-color); margin: 0 0 10px 0; font-size: 18px; font-weight: 600;
        }

        #no-data p {
            color: #888888; margin: 0; font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="chart-container">
        <div class="header-title">ระดับน้ำตาลในเลือดสะสม</div>
        
        <div id="chartUnit" class="chart-unit-label">ระดับน้ำตาลสะสม(%)</div>
        
        <div id="loading">กำลังประมวลผลข้อมูล...</div>
        
        <div id="no-data">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
            <h3>คุณยังไม่ได้รับการตรวจระดับน้ำตาลในเลือด</h3>
            <p>ข้อมูลจะแสดงผลเมื่อพยาบาลทำการบันทึกข้อมูลเข้าระบบเรียบร้อยแล้ว</p>
        </div>
        
        <div class="chart-wrapper">
            <canvas id="bloodSugarChart" style="display: none;"></canvas>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwLuqh2ivMXanbpRRbFfhMeOElAFgyrWBkFOthPZzCTjiI0gWdy7rDXTiuYlpj2Lzyb/exec';
        const LIFF_ID = '2009966517-3xJurBfY'; 

        Chart.register(ChartDataLabels);

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    fetchDataAndDrawChart(profile.userId); 
                } else {
                    liff.login(); 
                }
            } catch (err) {
                console.error('LIFF Init Error:', err);
                document.getElementById('loading').innerHTML = '<span style="color:red;">เกิดข้อผิดพลาดในการเชื่อมต่อระบบ LINE</span>';
            }
        }

        async function fetchDataAndDrawChart(lineId) {
            try {
                const response = await fetch(`${SCRIPT_URL}?type=getGraphData&line_id=${lineId}`);
                if (!response.ok) throw new Error("Network response was not ok");
                const data = await response.json();

                document.getElementById('loading').style.display = 'none';

                if (data && data.error) {
                    document.getElementById('loading').innerHTML = `<span style="color:red;">เกิดข้อผิดพลาด: ${data.error}</span>`;
                    document.getElementById('loading').style.display = 'block';
                    return;
                }

                if (!Array.isArray(data) || data.length === 0) {
                    document.getElementById('no-data').style.display = 'block';
                    return;
                }

                const labels = data.map(item => item.date);
                const values = data.map(item => item.value);

                document.getElementById('chartUnit').style.display = 'block';
                document.getElementById('bloodSugarChart').style.display = 'block';
                drawChart(labels, values);

            } catch (error) {
                console.error('Fetch Error:', error);
                document.getElementById('loading').innerHTML = '<span style="color:red;">ไม่สามารถดึงข้อมูลกราฟได้ในขณะนี้</span>';
                document.getElementById('loading').style.display = 'block';
            }
        }

        function drawChart(labels, values) {
            const ctx = document.getElementById('bloodSugarChart').getContext('2d');
            const maxVal = values.length > 0 ? Math.max(...values) : 10;

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels, 
                    datasets: [{
                        label: 'ระดับน้ำตาลสะสม(%)',
                        data: values, 
                        borderColor: '#ff5252',
                        backgroundColor: 'rgba(255, 82, 82, 0.06)',
                        borderWidth: 3,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#ff5252',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        fill: true,
                        tension: 0.2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false, 
                    layout: {
                        padding: {
                            left: 5,
                            right: 15,
                            top: 20,    
                            bottom: 110 // 🌟 เพิ่มพื้นที่ด้านล่างขึ้นอีกนิด เพื่อรองรับ Label "วันที่บันทึก" ไม่ให้ชนขอบล่าง
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            titleFont: { family: 'Sarabun', size: 13 },
                            bodyFont: { family: 'Sarabun', size: 13 }
                        },
                        datalabels: {
                            align: 'top',
                            anchor: 'end',
                            offset: 4,
                            color: '#222222',
                            backgroundColor: 'rgba(255, 255, 255, 0.9)', 
                            borderRadius: 4,
                            padding: { top: 2, bottom: 2, left: 5, right: 5 },
                            font: {
                                family: 'Sarabun',
                                size: 11,
                                weight: 'bold'
                            },
                            formatter: function(value) {
                                return value.toFixed(1); 
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            // 🌟 ส่วนการตั้งค่าเพิ่ม Label "วันที่บันทึก" ใต้แกน X
                            title: {
                                display: true,
                                text: 'วันที่บันทึก',
                                color: '#666666',
                                font: {
                                    family: 'Sarabun',
                                    size: 12,
                                    weight: 'bold'
                                },
                                padding: { top: 15 } // ระยะห่างระว่างข้อความกับตัวเลขวันที่
                            },
                            ticks: {
                                font: { family: 'Sarabun', size: 10 },
                                minRotation: 80, // 🌟 ปรับเอียงเฉียงเป็น 80 องศาขั้นต่ำ
                                maxRotation: 80, // 🌟 ปรับเอียงเฉียงเป็น 80 องศาขั้นสูง
                                autoSkip: false  // แสดงครบทุกจุดตรงตามกราฟ ไม่ข้ามข้อมูล
                            }
                        },
                        y: {
                            beginAtZero: true,
                            suggestMax: maxVal + 1.5, 
                            grid: { borderDash: [4, 4] },
                            ticks: {
                                font: { family: 'Sarabun', size: 11 }
                            }
                        }
                    }
                }
            });
        }

        main();
    </script>
</body>
</html>
