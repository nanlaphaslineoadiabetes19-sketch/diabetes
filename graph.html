<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กราฟแสดงระดับน้ำตาลในเลือดสะสม</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <style>
        :root {
            --primary-color: #ff5252;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 12px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .chart-container {
            background-color: var(--card-bg); width: 100%; max-width: 500px;
            padding: 24px 16px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06); position: relative;
        }

        .header-title {
            text-align: center; color: var(--text-main);
            font-size: 20px; font-weight: 600; margin-bottom: 16px;
        }

        /* 🌟 ส่วนระบุหน่วยแกน Y ด้านบนซ้ายตามมาตรฐานสากล (ช่วยเพิ่มพื้นที่หน้าจอด้านข้าง) */
        .chart-unit-label {
            font-size: 12px;
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 8px;
            display: none; /* เปิดแสดงผลพร้อมกราฟใน JS */
        }

        /* 🌟 ตัวควบคุมความสูงกราฟไม่ให้แบนราบเมื่อเจอบนจอมือถือแนวตั้งแคบๆ */
        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 320px; 
        }

        #loading {
            text-align: center; color: #666; padding: 50px 0; font-size: 16px; display: block;
        }

        #no-data {
            display: none; text-align: center; padding: 40px 15px;
        }

        #no-data svg {
            width: 70px; height: 70px; fill: #cccccc; margin-bottom: 15px;
        }

        #no-data h3 {
            color: var(--primary-color); margin: 0 0 10px 0; font-size: 18px; font-weight: 600;
        }

        #no-data p {
            color: #888888; margin: 0; font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="chart-container">
        <div class="header-title">ระดับน้ำตาลในเลือดสะสม</div>
        
        <div id="chartUnit" class="chart-unit-label">หน่วย: ระดับน้ำตาลในเลือดสะสม (%)</div>
        
        <div id="loading">กำลังประมวลผลข้อมูล...</div>
        
        <div id="no-data">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
            <h3>คุณยังไม่ได้รับการตรวจระดับน้ำตาลในเลือด</h3>
            <p>ข้อมูลจะแสดงผลเมื่อพยาบาลทำการบันทึกข้อมูลเข้าระบบเรียบร้อยแล้ว</p>
        </div>
        
        <div class="chart-wrapper">
            <canvas id="bloodSugarChart" style="display: none;"></canvas>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwLuqh2ivMXanbpRRbFfhMeOElAFgyrWBkFOthPZzCTjiI0gWdy7rDXTiuYlpj2Lzyb/exec';
        const LIFF_ID = '2009966517-3xJurBfY'; 

        // ลงทะเบียนปลั๊กอิน DataLabels สำหรับแสดงตัวเลขบนจุดยอดกราฟ
        Chart.register(ChartDataLabels);

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    fetchDataAndDrawChart(profile.userId); 
                } else {
                    liff.login(); 
                }
            } catch (err) {
                console.error('LIFF Init Error:', err);
                document.getElementById('loading').innerHTML = '<span style="color:red;">เกิดข้อผิดพลาดในการเชื่อมต่อระบบ LINE</span>';
            }
        }

        async function fetchDataAndDrawChart(lineId) {
            try {
                const response = await fetch(`${SCRIPT_URL}?type=getGraphData&line_id=${lineId}`);
                if (!response.ok) throw new Error("Network response was not ok");
                const data = await response.json();

                document.getElementById('loading').style.display = 'none';

                if (data && data.error) {
                    document.getElementById('loading').innerHTML = `<span style="color:red;">เกิดข้อผิดพลาด: ${data.error}</span>`;
                    document.getElementById('loading').style.display = 'block';
                    return;
                }

                if (!Array.isArray(data) || data.length === 0) {
                    document.getElementById('no-data').style.display = 'block';
                    return;
                }

                // 🌟 เทคนิคขั้นสูง: แปลงข้อความวันที่ยาวๆ ให้ตัดขึ้นบรรทัดใหม่ตรงช่องว่างเพื่อแยก "วันที่" กับ "เวลา"
                const labels = data.map(item => {
                    if (item.date && item.date.includes(' ')) {
                        return item.date.split(' '); // ส่งผลให้ออกมาเป็นอาร์เรย์แบบ ['วันที่', 'เวลา'] จะขึ้นบรรทัดใหม่อัตโนมัติใน Chart.js
                    }
                    return item.date;
                });
                
                const values = data.map(item => item.value);

                document.getElementById('chartUnit').style.display = 'block';
                document.getElementById('bloodSugarChart').style.display = 'block';
                drawChart(labels, values);

            } catch (error) {
                console.error('Fetch Error:', error);
                document.getElementById('loading').innerHTML = '<span style="color:red;">ไม่สามารถดึงข้อมูลกราฟได้ในขณะนี้</span>';
                document.getElementById('loading').style.display = 'block';
            }
        }

        function drawChart(labels, values) {
            const ctx = document.getElementById('bloodSugarChart').getContext('2d');
            const maxVal = values.length > 0 ? Math.max(...values) : 10;

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels, 
                    datasets: [{
                        label: 'ระดับน้ำตาล (%)',
                        data: values, 
                        borderColor: '#ff5252',
                        backgroundColor: 'rgba(255, 82, 82, 0.06)',
                        borderWidth: 3,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#ff5252',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        fill: true,
                        tension: 0.2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false, // 🌟 ปิดการล็อกสัดส่วนเดิม เพื่อให้ขยายความสูงเต็มตามค่า Wrapper CSS
                    layout: {
                        padding: {
                            left: 5,
                            right: 15,
                            top: 25,    // เผื่อพื้นที่ด้านบนให้ตัวเลขดึงข้อมูลไม่หลุดกรอบด้านบนสุด
                            bottom: 5
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            titleFont: { family: 'Sarabun', size: 13 },
                            bodyFont: { family: 'Sarabun', size: 13 }
                        },
                        // แสดงค่าแต่ละจุดบนกราฟแบบสวยงามเรียบร้อย
                        datalabels: {
                            align: 'top',
                            anchor: 'end',
                            offset: 3,
                            color: '#222222',
                            backgroundColor: 'rgba(255, 255, 255, 0.9)', // กล่องขาวใสซ่อนเส้นตารางหลังตัวเลข
                            borderRadius: 4,
                            padding: { top: 2, bottom: 2, left: 5, right: 5 },
                            font: {
                                family: 'Sarabun',
                                size: 11,
                                weight: 'bold'
                            },
                            formatter: function(value) {
                                return value.toFixed(1); 
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: {
                                font: { family: 'Sarabun', size: 10 },
                                maxRotation: 0, // 🌟 ไม่ต้องหมุนหัวเอียง 45 องศาแล้ว เพราะตัวอักษรแบ่งเป็น 2 บรรทัดแนวดิ่งเรียงลงมาอย่างสวยงาม
                                minRotation: 0,
                                autoSkip: true, // ข้ามบางจุดอัตโนมัติหากมีการตรวจถี่เกินไปจนหนาแน่น
                                maxTicksLimit: 4 // กำหนดให้บนจอมือถือแสดงไม่เกิน 4 ช่วงวันที่เพื่อความไม่แออัด
                            }
                        },
                        y: {
                            beginAtZero: true,
                            suggestMax: maxVal + 1.5, // ดึงเพดานกราฟให้สูงขึ้นหน่อยเพื่อไม่ให้กล่องตัวเลขด้านบนชนเพดาน
                            grid: { borderDash: [4, 4] },
                            ticks: {
                                font: { family: 'Sarabun', size: 11 }
                            }
                        }
                    }
                }
            });
        }

        main();
    </script>
</body>
</html>
