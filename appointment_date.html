<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .appointment-card { transition: transform 0.2s; border-left: 5px solid #0d6efd; }
        .appointment-card:hover { transform: scale(1.02); }
    </style>
</head>
<body class="p-3">
    <div class="container mt-4">
        <h3 class="mb-4 text-center">📅 ตารางนัดหมายของฉัน</h3>
        <div id="appointment-list">กำลังโหลดข้อมูล...</div>
    </div>

    <script>
        // 1. ประกาศตัวแปร urlParams ให้ถูกต้องก่อนใช้งาน
        const urlParams = new URLSearchParams(window.location.search);
        
        // 2. ดึงค่า line_id ออกมา (ตรวจสอบให้แน่ใจว่าใน URL มีการส่ง ?line_id=... มาด้วย)
        const myLineId = urlParams.get('line_id');
       // const myLineId = 'Ubb14a9e757138710939fd9b7d49efe3c';
        
        // 3. กำหนด URL ของ Web App ที่ได้จากการ Deploy
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwLuqh2ivMXanbpRRbFfhMeOElAFgyrWBkFOthPZzCTjiI0gWdy7rDXTiuYlpj2Lzyb/exec'; // ต้องได้มาจากตอน Deploy
        
        // 4. เรียกใช้ fetch เพื่อดึงข้อมูล
        fetch(`${SCRIPT_URL}?action=getAppointments&lineId=${myLineId}`)
            .then(response => response.json())
            .then(data => {
                // เพิ่มการตรวจสอบว่า data เป็น Array หรือไม่ก่อนส่งให้ฟังก์ชัน
                if (Array.isArray(data)) {
                    showAppointments(data);
                } else {
                    document.getElementById('appointment-list').innerHTML = 
                        '<div class="alert alert-warning">ไม่พบข้อมูลนัดหมาย</div>';
                    console.log("Data returned is not an array:", data);
                }
            })
            .catch(error => {
                document.getElementById('appointment-list').innerHTML = 
                    '<div class="alert alert-danger">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>';
                console.error('Error:', error);
            });

        function showAppointments(data) {
            const container = document.getElementById('appointment-list');
            if (data.length === 0) {
                container.innerHTML = '<div class="alert alert-info">ยังไม่มีนัดหมายในขณะนี้</div>';
                return;
            }
    
            let html = '';
            data.forEach(item => {
                const d = new Date(item.app_date || item.date); 
                const dateStr = d.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
                const timeStr = d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    
                html += `
                <div class="card mb-3 appointment-card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-primary">${dateStr}</h5>
                        <p class="card-text mb-1">⏰ เวลา: <strong>${timeStr} น.</strong></p>
                        <span class="badge bg-success">${item.status || 'confirmed'}</span>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }
    </script>
</body>
</html>
