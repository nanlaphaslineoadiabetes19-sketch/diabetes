<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .appointment-card { transition: transform 0.2s; border-left: 5px solid #0d6efd; }
        .appointment-card:hover { transform: scale(1.02); }
    </style>
</head>
<body class="p-3">
    <div class="container mt-4">
        <h3 class="mb-4 text-center">📅 ตารางนัดหมายของฉัน</h3>
        <div id="appointment-list">กำลังโหลดข้อมูล...</div>
    </div>

    <script>
        // สมมติว่ารับ line_id ผ่าน query string เช่น ?line_id=U...
        const urlParams = new URLSearchParams(window.location.search);
        const myLineId = urlParams.get('line_id');

        // ดึงเฉพาะคนๆ นั้น
        google.script.run.withSuccessHandler(showAppointments).getAppointments(myLineId);

        function showAppointments(data) {
            const container = document.getElementById('appointment-list');
            if (data.length === 0) {
                container.innerHTML = '<div class="alert alert-info">ยังไม่มีนัดหมายในขณะนี้</div>';
                return;
            }

            let html = '';
            data.forEach(item => {
                const d = new Date(item.date);
                const dateStr = d.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
                const timeStr = d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });

                html += `
                <div class="card mb-3 appointment-card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-primary">${dateStr}</h5>
                        <p class="card-text mb-1">⏰ เวลา: <strong>${timeStr} น.</strong></p>
                        <span class="badge bg-success">${item.status}</span>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }
    </script>
</body>
</html>
