<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .appointment-card { transition: transform 0.2s; border-left: 5px solid #0d6efd; }
        .appointment-card:hover { transform: scale(1.02); }
    </style>
    <!-- 1. เพิ่ม Script ของ LINE LIFF -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="p-3">
    <div class="container mt-4">
        <h3 class="mb-4 text-center">📅 ตารางนัดหมายของฉัน</h3>
        <div id="appointment-list">กำลังเชื่อมต่อกับ LINE...</div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwLuqh2ivMXanbpRRbFfhMeOElAFgyrWBkFOthPZzCTjiI0gWdy7rDXTiuYlpj2Lzyb/exec'; 

        // 2. เริ่มต้นการทำงานของ LIFF
        async function initializeLiff() {
            try {
                // ใส่ LIFF ID ของคุณที่ได้จาก LINE Developers ลงในช่องนี้
                await liff.init({ liffId: "2009966517-g4zfasyj" }); 
                
                if (liff.isLoggedIn()) {
                    // ดึง Profile ของผู้ใช้ และดึง userId ออกมา
                    const profile = await liff.getProfile();
                    const myLineId = profile.userId;
                    
                    document.getElementById('appointment-list').innerHTML = 'กำลังโหลดข้อมูล...';
                    fetchAppointments(myLineId); // เรียกฟังก์ชันดึงข้อมูลนัดหมาย
                } else {
                    liff.login(); // บังคับล็อกอินถ้าเปิดบนเบราว์เซอร์ภายนอก
                }
            } catch (err) {
                console.error('LIFF Initialization failed', err);
                document.getElementById('appointment-list').innerHTML = '<div class="alert alert-danger">ไม่สามารถเชื่อมต่อกับบัญชี LINE ได้</div>';
            }
        }

        // 3. ฟังก์ชันสำหรับดึงข้อมูล (โค้ดเดิมของคุณ)
        function fetchAppointments(myLineId) {
            fetch(`${SCRIPT_URL}?action=getAppointments&lineId=${myLineId}`)
                .then(response => response.json())
                .then(data => {
                    if (Array.isArray(data)) {
                        showAppointments(data);
                    } else {
                        document.getElementById('appointment-list').innerHTML = 
                            '<div class="alert alert-warning">ไม่พบข้อมูลนัดหมาย</div>';
                    }
                })
                .catch(error => {
                    document.getElementById('appointment-list').innerHTML = 
                        '<div class="alert alert-danger">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>';
                });
        }

        function showAppointments(data) {
            const container = document.getElementById('appointment-list');
            if (data.length === 0) {
                container.innerHTML = '<div class="alert alert-info">ยังไม่มีนัดหมายในขณะนี้</div>';
                return;
            }
    
            let html = '';
            data.forEach(item => {
                const d = new Date(item.app_date || item.date); 
                const dateStr = d.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
                const timeStr = d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    
                html += `
                <div class="card mb-3 appointment-card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-primary">${dateStr}</h5>
                        <p class="card-text mb-1">⏰ เวลา: <strong>${timeStr} น.</strong></p>
                        <span class="badge bg-success">${item.status || 'confirmed'}</span>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        // เรียกใช้งาน LIFF ทันทีที่โหลดหน้าเว็บ
        initializeLiff();
    </script>
</body>
</html>
