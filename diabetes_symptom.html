<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>อาการของโรคเบาหวาน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        padding: 20px 0;
        background-color: #f0f2f5;
        font-family: 'Sarabun', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        width: 100%;
        max-width: 600px;
        padding: 0 15px;
        box-sizing: border-box;
      }

      .nav-bar {
        width: 100%;
        max-width: 600px;
        margin-bottom: 15px;
      }

      .btn-back {
        padding: 10px 20px;
        background-color: #6c757d;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: 'Sarabun', sans-serif;
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .main-wrapper {
        width: 100%;
        background: white;
        box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        margin-bottom: 20px; /* ระยะห่างระหว่างภาพ */
      }

      img {
        width: 100%;
        height: auto;
        display: block;
        margin: 0;
      }
    </style>
  </head>
  <body>

    <div class="container">
      <div class="nav-bar">
        <button class="btn-back" onclick="goBack()">
          ⬅ กลับหน้าหลัก
        </button>
      </div>

      <div class="main-wrapper">
        <img src="https://lh3.googleusercontent.com/d/1tsgfVYIGcePGMfw-1F6w8X732IAwDKit" alt="อาการเบาหวาน 1">
      </div>
      <div class="main-wrapper">
        <img src="https://lh3.googleusercontent.com/d/1Q62HYPvYyu39fos2T2NOaU-yoFK9_hdr" alt="อาการเบาหวาน 2">
      </div>
      <div class="main-wrapper">
        <img src="https://lh3.googleusercontent.com/d/1BbiXsmFlr2cKbJYRuaSE14AKvIaqS3Yi" alt="อาการเบาหวาน 3">
      </div>
    </div>

    <script>
      function goBack() {
        // พาผู้ใช้กลับไปที่หน้าหลัก diabetes.html ใน GitHub
        var currentPath = window.location.pathname;
        var directoryPath = currentPath.substring(0, currentPath.lastIndexOf('/'));
        location.href = directoryPath + '/diabetes.html';
      }
    </script>
  </body>
</html>
