<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ความหมายของโรคเบาหวาน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f0f2f5;
        font-family: 'Sarabun', sans-serif;
        /* ลบ Flexbox ออกเพื่อให้ position: fixed ทำงานได้อิสระ */
      }

      /* บังคับปุ่มให้ลอยค้างที่มุมซ้ายบน */
      .nav-bar-fixed {
        position: fixed !important;
        top: 20px !important;
        left: 20px !important;
        z-index: 99999 !important;
        width: auto;
      }

      .btn-back {
        padding: 10px 20px;
        background-color: rgba(108, 117, 125, 0.9);
        color: white;
        border: none;
        border-radius: 50px; /* ทรงแคปซูลเพื่อให้ดูเป็นปุ่มลอย */
        cursor: pointer;
        font-family: 'Sarabun', sans-serif;
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        backdrop-filter: blur(5px);
        transition: all 0.3s ease;
      }

      .btn-back:hover {
        background-color: #495057;
        transform: scale(1.05);
      }

      .container {
        width: 100%;
        max-width: 600px;
        /* ดันเนื้อหาลงมา 80px เพื่อหลบปุ่มที่ลอยอยู่ */
        padding: 80px 15px 40px 15px;
        box-sizing: border-box;
        margin: 0 auto; /* จัดกึ่งกลางหน้าจอ */
      }

      .main-wrapper {
        width: 100%;
        background: white;
        box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        border-radius: 12px;
        overflow: hidden;
        line-height: 0;
        font-size: 0;
      }

      img {
        width: 100%;
        height: auto;
        display: block;
        margin: 0;
        padding: 0;
        border: none;
      }
    </style>
  </head>
  <body>

    <div class="nav-bar-fixed">
      <button class="btn-back" onclick="goBack()">
        ⬅ กลับหน้าหลัก
      </button>
    </div>

    <div class="container">
      <div class="main-wrapper">
        <img src="https://lh3.googleusercontent.com/d/12HUpqDQkMAplgaHJZN1ziCaezS_MmEue" alt="ความหมายโรคเบาหวาน">
      </div>
    </div>

    <script>
      function goBack() {
        var currentPath = window.location.pathname;
        var directoryPath = currentPath.substring(0, currentPath.lastIndexOf('/'));
        location.href = directoryPath + '/diabetes.html';
      }
    </script>

  </body>
</html>
