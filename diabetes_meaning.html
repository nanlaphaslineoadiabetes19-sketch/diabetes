<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ความหมายของโรคเบาหวาน</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f0f2f5;
        font-family: 'Sarabun', sans-serif;
      }
      .container {
        width: 100%;
        max-width: 600px;
        padding: 80px 15px 40px 15px; /* ดันเนื้อหาลงมาหลบปุ่ม */
        box-sizing: border-box;
        margin: 0 auto;
      }
      .main-wrapper {
        width: 100%;
        background: white;
        box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        border-radius: 12px;
        overflow: hidden;
        line-height: 0;
        font-size: 0;
      }
      img {
        width: 100%;
        height: auto;
        display: block;
        margin: 0;
      }
    </style>
  </head>
  <body>

    <div style="position: fixed !important; top: 15px; left: 15px; z-index: 999999;">
      <button onclick="goBack()" style="
        padding: 12px 24px;
        background-color: #6c757d;
        color: white;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        font-family: 'Sarabun', sans-serif;
        font-size: 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      ">
        ⬅ กลับหน้าหลัก
      </button>
    </div>

    <div class="container">
      <div class="main-wrapper">
        <img src="https://lh3.googleusercontent.com/d/12HUpqDQkMAplgaHJZN1ziCaezS_MmEue" alt="ความหมายโรคเบาหวาน">
      </div>
    </div>

    <script>
      function goBack() {
        var currentPath = window.location.pathname;
        var directoryPath = currentPath.substring(0, currentPath.lastIndexOf('/'));
        location.href = directoryPath + '/diabetes.html';
      }
    </script>
  </body>
</html>
